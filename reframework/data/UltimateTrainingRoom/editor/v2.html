<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行为树编辑器 v2</title>
<style>
/* ============================================================
   CSS Variables — 色彩体系 & 全局 token
   ============================================================ */
:root {
  /* 画布 */
  --canvas-bg: #1a1a2e;
  --grid-fine: #222240;
  --grid-coarse: #2a2a45;

  /* 面板 */
  --panel-bg: #12121e;
  --panel-border: #2a2a45;

  /* 文字 */
  --text-primary: #d4d4e8;
  --text-secondary: #6c6c8a;
  --text-disabled: #44445a;

  /* 交互 */
  --accent: #5a9bf6;
  --danger: #e05555;

  /* 类别色 */
  --cat-composite: #3a7ebf;
  --cat-decorator: #4a9a6a;
  --cat-action: #c07838;
  --cat-condition: #b89a30;

  /* 控件 */
  --btn-bg: #2a2a45;
  --btn-hover: #3a3a55;
  --input-bg: #1e1e34;
  --input-border: #2a2a45;

  /* 圆角 */
  --radius-node: 6px;
  --radius-btn: 4px;
  --radius-input: 3px;
  --radius-popup: 8px;

  /* 字体 */
  --font: 'Segoe UI', system-ui, sans-serif;
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--font);
  font-size: 12px;
  color: var(--text-primary);
  background: var(--canvas-bg);
  user-select: none;
}

/* ============================================================
   Layout — 三栏 flex
   ============================================================ */
#app {
  display: flex;
  width: 100%; height: 100%;
}

/* ---------- 左面板 ---------- */
#left-panel {
  width: 200px;
  min-width: 0;
  background: var(--panel-bg);
  border-right: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

#left-panel.collapsed { width: 0 !important; border-right: none; overflow: visible; }
#left-panel.collapsed > *:not(.panel-collapse-btn-collapsed) { display: none; }

/* ---------- 分隔条 ---------- */
.divider {
  width: 4px;
  cursor: col-resize;
  background: transparent;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.divider.active { background: #3a5a8f; }

/* ---------- 中央画布区 ---------- */
#canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--canvas-bg);
}

#grid-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

#node-container {
  position: absolute;
  top: 0; left: 0;
  width: 0; height: 0;
  z-index: 1;
  transform-origin: 0 0;
}

#connection-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

#selection-rect {
  position: absolute;
  display: none;
  border: 1px solid rgba(90,155,246,0.9);
  background: rgba(90,155,246,0.16);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  pointer-events: none;
  z-index: 5;
}

/* ---------- 右面板 ---------- */
#right-panel {
  width: 260px;
  min-width: 0;
  background: var(--panel-bg);
  border-left: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

#right-panel.collapsed { width: 0 !important; border-left: none; overflow: visible; }
#right-panel.collapsed > *:not(.panel-collapse-btn-collapsed) { display: none; }

/* ============================================================
   面板公共样式
   ============================================================ */
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-bottom: 1px solid var(--panel-border);
  font-size: 13px;
  font-weight: bold;
  flex-shrink: 0;
}

.panel-collapse-btn {
  background: none;
  border: 1px solid var(--panel-border);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 14px;
  width: 24px; height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-btn);
  flex-shrink: 0;
}
.panel-collapse-btn:hover { background: var(--btn-hover); color: var(--text-primary); }

/* 折叠后的展开按钮 — 贴在分隔条旁 */
.panel-collapse-btn-collapsed {
  display: none;
  position: absolute;
  top: 8px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 14px;
  width: 24px; height: 24px;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-btn);
  z-index: 20;
}
.panel-collapse-btn-collapsed:hover { background: var(--btn-hover); color: var(--text-primary); }

#left-panel.collapsed .panel-collapse-btn-collapsed {
  display: flex;
  right: -28px;
}
#right-panel.collapsed .panel-collapse-btn-collapsed {
  display: flex;
  left: -28px;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
}

.panel-body::-webkit-scrollbar { width: 5px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
.panel-body::-webkit-scrollbar-thumb:hover { background: var(--btn-hover); }

/* ============================================================
   工具栏 — 画布左上角浮动
   ============================================================ */
#toolbar {
  position: fixed;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 2px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-btn);
  padding: 3px;
}

.toolbar-btn {
  background: var(--btn-bg);
  border: none;
  color: var(--text-primary);
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 8px;
  border-radius: var(--radius-btn);
  white-space: nowrap;
}
.toolbar-btn:hover { background: var(--btn-hover); }
.toolbar-btn:active { background: var(--accent); color: #fff; }
.toolbar-btn.disabled {
  opacity: 0.35;
  cursor: pointer;
}

/* ============================================================
   右面板内容占位
   ============================================================ */
.placeholder-text {
  color: var(--text-disabled);
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
}

/* ============================================================
   搜索框
   ============================================================ */
.search-box {
  width: 100%;
  padding: 5px 8px;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-input);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 12px;
  outline: none;
  margin-bottom: 8px;
}
.search-box::placeholder { color: var(--text-disabled); }
.search-box:focus { border-color: var(--accent); }

.palette-group {
  margin-bottom: 10px;
}

.palette-group-title {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.palette-item {
  display: grid;
  grid-template-columns: 3px 1fr;
  align-items: center;
  min-height: 24px;
  margin-bottom: 4px;
  background: rgba(22, 22, 36, 0.72);
  border: 1px solid #2a2a45;
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
}

.palette-item:hover {
  border-color: #4a4a68;
  background: rgba(28, 28, 44, 0.88);
}

.palette-item-strip {
  align-self: stretch;
}

.palette-item-name {
  padding: 0 8px;
  font-size: 12px;
  color: var(--text-primary);
}

.palette-drag-preview {
  position: fixed;
  width: 160px;
  height: 28px;
  border-radius: 6px;
  box-shadow: 2px 6px 14px rgba(0,0,0,0.45);
  overflow: hidden;
  pointer-events: none;
  z-index: 200;
  opacity: 0.82;
}

.palette-drag-preview-title {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 12px;
  font-weight: bold;
}

.context-menu {
  position: fixed;
  min-width: 180px;
  background: #1c1c2f;
  border: 1px solid #343453;
  border-radius: 6px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.4);
  padding: 4px;
  z-index: 300;
  display: none;
}

.context-menu.open {
  display: block;
}

.context-menu-item {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 24px;
  padding: 0 8px;
  border-radius: 4px;
  color: var(--text-primary);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
}

.context-menu-item:hover {
  background: rgba(90,155,246,0.16);
}

.context-menu-item.disabled {
  color: var(--text-disabled);
  cursor: default;
}

.context-menu-item.disabled:hover {
  background: transparent;
}

.context-menu-separator {
  height: 1px;
  margin: 4px 2px;
  background: #31314b;
}

.context-menu-arrow {
  color: var(--text-secondary);
}

.context-submenu {
  position: absolute;
  top: 0;
  left: 100%;
  min-width: 180px;
  background: #1c1c2f;
  border: 1px solid #343453;
  border-radius: 6px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.4);
  padding: 4px;
  display: none;
}

.context-menu-item:hover > .context-submenu {
  display: block;
}

/* ============================================================
   节点 — HTML div 渲染
   ============================================================ */
.bt-node {
  position: absolute;
  width: 160px;
  border-radius: var(--radius-node);
  border: 1px solid var(--panel-border);
  box-shadow: 2px 3px 8px rgba(0,0,0,0.4);
  cursor: default;
  font-family: var(--font);
  transition: box-shadow 0.15s;
}
.bt-node:hover {
  border-color: #505068;
  box-shadow: 3px 5px 16px rgba(0,0,0,0.6), 0 0 4px rgba(90,155,246,0.15);
}
.bt-node.selected {
  border-color: color-mix(in srgb, var(--node-cat-color, var(--accent)) 72%, #ffffff 28%);
  box-shadow: 0 0 0 1px color-mix(in srgb, var(--node-cat-color, var(--accent)) 55%, transparent), 0 0 8px 2px var(--node-cat-color, var(--accent));
}
.bt-node.multi-selected {
  border-color: color-mix(in srgb, var(--node-cat-color, var(--accent)) 55%, #ffffff 12%);
  box-shadow: 0 0 0 1px color-mix(in srgb, var(--node-cat-color, var(--accent)) 35%, transparent), 0 0 5px 1px rgba(90,155,246,0.22);
}
.bt-node.connection-valid-node {
  border-color: color-mix(in srgb, var(--node-cat-color, var(--accent)) 75%, #ffffff 25%);
  box-shadow: 0 0 0 1px color-mix(in srgb, var(--node-cat-color, var(--accent)) 45%, transparent), 0 0 10px 2px color-mix(in srgb, var(--node-cat-color, var(--accent)) 65%, transparent);
}

.bt-node-validation {
  position: absolute;
  right: -6px;
  top: -6px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-bottom: 14px solid #d9aa33;
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.45));
  display: none;
}

.bt-node-validation.error {
  border-bottom-color: #d05757;
}

.bt-node.has-validation .bt-node-validation {
  display: block;
}

.validation-panel {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 300px;
  max-height: 320px;
  display: none;
  flex-direction: column;
  background: rgba(28, 28, 47, 0.98);
  border: 1px solid #343453;
  border-radius: 8px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.36);
  z-index: 260;
  overflow: hidden;
}

.validation-panel.open {
  display: flex;
}

.validation-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-bottom: 1px solid var(--panel-border);
  font-size: 12px;
  font-weight: bold;
}

.validation-panel-list {
  overflow-y: auto;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.validation-item {
  padding: 6px 8px;
  border: 1px solid #31314b;
  border-radius: 6px;
  background: rgba(22, 22, 36, 0.72);
  cursor: pointer;
}

.validation-item:hover {
  border-color: #4a4a68;
}

.validation-item-title {
  font-size: 11px;
  color: var(--text-primary);
}

.validation-item-meta {
  margin-top: 2px;
  font-size: 10px;
  color: var(--text-secondary);
}

.validation-item.error {
  border-color: rgba(208,87,87,0.35);
}

.validation-item.warning {
  border-color: rgba(217,170,51,0.35);
}

.help-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 10, 18, 0.62);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 280;
}

.help-overlay.open {
  display: flex;
}

.help-dialog {
  width: 420px;
  max-width: calc(100vw - 32px);
  background: rgba(28, 28, 47, 0.98);
  border: 1px solid #343453;
  border-radius: 8px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.36);
  overflow: hidden;
}

.help-dialog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid var(--panel-border);
  font-size: 12px;
  font-weight: bold;
}

.help-dialog-body {
  padding: 10px 12px;
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 8px 12px;
  font-size: 11px;
}

.help-key {
  color: var(--text-primary);
}

.help-desc {
  color: var(--text-secondary);
}
.bt-node.disabled {
  filter: grayscale(0.75);
}

/* 标题栏 */
.bt-node-title {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
  border-radius: var(--radius-node) var(--radius-node) 0 0;
  background: var(--node-cat-color, var(--accent));
  font-size: 12px;
  font-weight: bold;
  color: #fff;
  position: relative;
  cursor: default;
}
.bt-node.selected .bt-node-title {
  filter: brightness(1.15);
}

/* 标题图标（左侧绝对定位）— 用于激活/关闭节点（后续实现） */
.bt-node-icon {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 2px;
  background: rgba(255,255,255,0.4);
  cursor: pointer;
}
.bt-node-icon:hover { background: rgba(255,255,255,0.7); }
.bt-node.disabled .bt-node-icon {
  background: rgba(0,0,0,0.28);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
}

/* Root 节点：隐藏小方块，显示 ★ */
.bt-node.is-root .bt-node-icon { display: none; }

/* Root 标记（左侧绝对定位，与小方块同位置） */
.bt-node-root-mark {
  display: none;
  position: absolute;
  left: 7px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: #ffd700;
}
.bt-node.is-root .bt-node-root-mark { display: block; }

/* 标题文字（居中） */
.bt-node-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: center;
}

/* 三角展开图标（右侧绝对定位） */
.bt-node-toggle {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  width: 16px;
  text-align: center;
}
.bt-node-toggle:hover { color: #fff; }
.bt-node-toggle.hidden { display: none; }

/* 摘要区 */
.bt-node-summary {
  padding: 3px 8px;
  font-size: 11px;
  color: #a0a0be;
  background: rgba(18, 18, 30, 0.7);
  border-radius: 0 0 var(--radius-node) var(--radius-node);
  min-height: 18px;
  line-height: 18px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 展开区（属性编辑） */
.bt-node-props {
  padding: 4px 8px 6px;
  background: rgba(18, 18, 30, 0.7);
  border-radius: 0 0 var(--radius-node) var(--radius-node);
  display: none;
}
.bt-node.expanded .bt-node-props { display: block; }
.bt-node.expanded .bt-node-summary { display: none; }

.bt-node-prop-row {
  display: flex;
  align-items: center;
  min-height: 24px;
  gap: 6px;
  font-size: 11px;
  margin-top: 4px;
}
.bt-node-prop-label {
  color: var(--text-secondary);
  width: 52px;
  flex-shrink: 0;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bt-node-prop-input {
  flex: 1;
  min-width: 0;
  height: 20px;
  padding: 2px 6px;
  background: rgba(24, 24, 38, 0.95);
  border: 1px solid #30304a;
  border-radius: var(--radius-input);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 11px;
  outline: none;
}
.bt-node-prop-input[type="number"] {
  appearance: textfield;
  -moz-appearance: textfield;
}
.bt-node-prop-input[type="number"]::-webkit-outer-spin-button,
.bt-node-prop-input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.bt-node-prop-input:hover { border-color: #40405f; }
.bt-node-prop-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(90,155,246,0.18);
}

.bt-node-prop-select {
  position: relative;
  flex: 1;
  min-width: 0;
}

.bt-node-prop-select-btn {
  width: 100%;
  height: 20px;
  padding: 2px 24px 2px 6px;
  background: rgba(24, 24, 38, 0.95);
  border: 1px solid #30304a;
  border-radius: var(--radius-input);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 11px;
  text-align: left;
  cursor: pointer;
  position: relative;
}

.bt-node-prop-select-btn::before,
.bt-node-prop-select-btn::after {
  content: '';
  position: absolute;
  right: 10px;
  top: 50%;
  width: 5px;
  height: 1px;
  background: #8f96b8;
  transform-origin: center;
}

.bt-node-prop-select-btn::before {
  transform: translateY(-1px) rotate(45deg);
  right: 13px;
}

.bt-node-prop-select-btn::after {
  transform: translateY(-1px) rotate(-45deg);
  right: 10px;
}

.bt-node-prop-select:hover .bt-node-prop-select-btn {
  border-color: #40405f;
}

.bt-node-prop-select.open .bt-node-prop-select-btn,
.bt-node-prop-select-btn:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(90,155,246,0.18);
}

.bt-node-prop-select-menu {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: #202033;
  border: 1px solid #3b4663;
  border-radius: 4px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.35);
  overflow: hidden;
  z-index: 50;
}

.bt-node-prop-select.open .bt-node-prop-select-menu {
  display: block;
}

.bt-node-prop-select-option {
  display: block;
  width: 100%;
  padding: 5px 8px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 11px;
  text-align: left;
  cursor: pointer;
}

.bt-node-prop-select-option.active {
  background: rgba(90,155,246,0.10);
}

.bt-node-prop-select-option:hover,
.bt-node-prop-select-option:focus-visible {
  background: rgba(90,155,246,0.20);
}
.bt-node-prop-checkbox {
  width: 14px;
  height: 14px;
  margin: 0;
  accent-color: var(--accent);
}

/* 端口 — 外层为扩大的点击/悬停区域，内层伪元素为可见圆点 */
.bt-port {
  position: absolute;
  left: 50%;
  width: 20px; height: 20px;
  margin-left: -10px;
  border-radius: 50%;
  background: transparent;
  z-index: 2;
  cursor: crosshair;
}
.bt-port::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  margin: -4px 0 0 -4px;
  border-radius: 50%;
  background: #3a3a55;
  border: 1.5px solid #555;
  transition: transform 0.1s, background 0.1s, box-shadow 0.1s;
}
.bt-port:hover::after {
  transform: scale(1.3);
  background: var(--node-cat-color, var(--accent));
  box-shadow: 0 0 6px 2px var(--node-cat-color, var(--accent));
}
.bt-port-in { top: -10px; }
.bt-port-out { bottom: -10px; }
.bt-port.connection-valid::after {

/* ============================================================
   全局状态
   ============================================================ */
const state = {
  // 视口
  panX: 0,
  panY: 0,
  zoom: 1,

  // 面板宽度
  leftPanelWidth: 200,
  rightPanelWidth: 260,
  leftCollapsed: false,

  // 选择
  selectedNodeId: null,
  selectedNodeIds: [],

  // 连线拖拽
  connectionDrag: null,

  // 连线悬停
  hoveredConnection: null,

  // 端口悬停
  hoveredPort: null,

  // 框选
  marquee: null,
};

/* ============================================================
   DOM 引用
   ============================================================ */
const $app           = document.getElementById('app');
const $leftPanel     = document.getElementById('left-panel');
const $rightPanel    = document.getElementById('right-panel');
const $leftDivider   = document.getElementById('left-divider');
const $rightDivider  = document.getElementById('right-divider');
const $canvasArea    = document.getElementById('canvas-area');
const $gridCanvas    = document.getElementById('grid-canvas');
const $connCanvas    = document.getElementById('connection-canvas');
const $nodeContainer = document.getElementById('node-container');
const $rightPanelBody = document.getElementById('right-panel-body');
const $nodeSearch = document.getElementById('node-search');
const $nodePaletteList = document.getElementById('node-palette-list');
const $selectionRect = document.getElementById('selection-rect');
const $contextMenu = document.getElementById('context-menu');
const $recoveryBanner = document.getElementById('recovery-banner');
const $btnRecoverTree = document.getElementById('btn-recover-tree');
const $btnDiscardRecovery = document.getElementById('btn-discard-recovery');
const $btnLayout = document.getElementById('btn-layout');
const $btnValidate = document.getElementById('btn-validate');
const $validationPanel = document.getElementById('validation-panel');
const $validationPanelList = document.getElementById('validation-panel-list');
const $btnCloseValidation = document.getElementById('btn-close-validation');
const $helpOverlay = document.getElementById('help-overlay');
const $btnCloseHelp = document.getElementById('btn-close-help');
const $btnSnap = document.getElementById('btn-snap');
const $btnHelp = document.getElementById('btn-help');
const $btnUndo = document.getElementById('btn-undo');
const $btnRedo = document.getElementById('btn-redo');

/* ============================================================
   面板折叠/展开
   ============================================================ */
function toggleLeftPanel() {
  state.leftCollapsed = !state.leftCollapsed;
  if (state.leftCollapsed) {
    $leftPanel.classList.add('collapsed');
    $leftPanel.style.width = '0';
  } else {
    $leftPanel.classList.remove('collapsed');
    $leftPanel.style.width = state.leftPanelWidth + 'px';
  }
  onResize();
}

function toggleRightPanel() {
  state.rightCollapsed = !state.rightCollapsed;
  if (state.rightCollapsed) {
    $rightPanel.classList.add('collapsed');
    $rightPanel.style.width = '0';
  } else {
    $rightPanel.classList.remove('collapsed');
    $rightPanel.style.width = state.rightPanelWidth + 'px';
  }
  onResize();
}

document.getElementById('left-collapse-btn').addEventListener('click', toggleLeftPanel);
document.getElementById('left-expand-btn').addEventListener('click', toggleLeftPanel);
document.getElementById('right-collapse-btn').addEventListener('click', toggleRightPanel);
document.getElementById('right-expand-btn').addEventListener('click', toggleRightPanel);
$btnUndo.addEventListener('click', undo);
$btnRedo.addEventListener('click', redo);
$nodeSearch.addEventListener('input', renderNodePalette);
$btnSnap.addEventListener('click', () => {
  snapEnabled = !snapEnabled;
  $btnSnap.classList.toggle('disabled', !snapEnabled);
});
$btnLayout.addEventListener('click', autoLayoutTree);
$btnValidate.addEventListener('click', openValidationPanel);
$btnCloseValidation.addEventListener('click', closeValidationPanel);
$btnHelp.addEventListener('click', openHelpOverlay);
$btnCloseHelp.addEventListener('click', closeHelpOverlay);
$helpOverlay.addEventListener('mousedown', (e) => {
  if (e.target === $helpOverlay) closeHelpOverlay();
});
$btnRecoverTree.addEventListener('click', () => {
  if (!recoveredAutosave) return;
  applyAutosavePayload(recoveredAutosave);
  showRecoveryBanner(false);
  recoveredAutosave = null;
});
$btnDiscardRecovery.addEventListener('click', () => {
  recoveredAutosave = null;
  clearAutosave();
  showRecoveryBanner(false);
});

/* ============================================================
   分隔条拖拽调宽
   ============================================================ */
function initDivider(dividerEl, panel, side) {
  let dragging = false;
  let startX = 0;
  let startW = 0;

  const MIN = side === 'left' ? 150 : 200;
  const MAX = 600;

  dividerEl.addEventListener('mousedown', (e) => {
    if (side === 'left' && state.leftCollapsed) return;
    if (side === 'right' && state.rightCollapsed) return;
    e.preventDefault();
    dragging = true;
    startX = e.clientX;
    startW = panel.getBoundingClientRect().width;
    dividerEl.classList.add('active');
    document.body.style.cursor = 'col-resize';
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    e.preventDefault();
    const dx = side === 'left' ? (e.clientX - startX) : (startX - e.clientX);
    let newW = Math.round(startW + dx);
    newW = Math.max(MIN, Math.min(MAX, newW));
    panel.style.width = newW + 'px';

    if (side === 'left') state.leftPanelWidth = newW;
    else state.rightPanelWidth = newW;

    onResize();
  });

  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    dividerEl.classList.remove('active');
    document.body.style.cursor = '';
  });
}

initDivider($leftDivider, $leftPanel, 'left');
initDivider($rightDivider, $rightPanel, 'right');

/* ============================================================
   Canvas 尺寸管理
   ============================================================ */
function resizeCanvases() {
  const rect = $canvasArea.getBoundingClientRect();
  const w = Math.round(rect.width);
  const h = Math.round(rect.height);
  const dpr = window.devicePixelRatio || 1;

  for (const cvs of [$gridCanvas, $connCanvas]) {
    cvs.width = w * dpr;
    cvs.height = h * dpr;
    cvs.style.width = w + 'px';
    cvs.style.height = h + 'px';
    cvs.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  }
}

/* ============================================================
   背景网格绘制
   ============================================================ */
function drawGrid() {
  const ctx = $gridCanvas.getContext('2d');
  const rect = $canvasArea.getBoundingClientRect();
  const w = Math.round(rect.width);
  const h = Math.round(rect.height);

  ctx.clearRect(0, 0, w, h);

  const zoom = state.zoom;
  const ox = state.panX;
  const oy = state.panY;

  // 小格 40px
  const smallStep = 40 * zoom;
  if (smallStep > 4) { // 太小就不画
    ctx.beginPath();
    ctx.strokeStyle = '#222240';
    ctx.lineWidth = 1;

    const startX = (ox % smallStep + smallStep) % smallStep;
    for (let x = startX; x < w; x += smallStep) {
      ctx.moveTo(Math.round(x) + 0.5, 0);
      ctx.lineTo(Math.round(x) + 0.5, h);
    }
    const startY = (oy % smallStep + smallStep) % smallStep;
    for (let y = startY; y < h; y += smallStep) {
      ctx.moveTo(0, Math.round(y) + 0.5);
      ctx.lineTo(w, Math.round(y) + 0.5);
    }
    ctx.stroke();
  }

  // 大格 200px
  const largeStep = 200 * zoom;
  if (largeStep > 10) {
    ctx.beginPath();
    ctx.strokeStyle = '#2a2a45';
    ctx.lineWidth = 1;

    const startX2 = (ox % largeStep + largeStep) % largeStep;
    for (let x = startX2; x < w; x += largeStep) {
      ctx.moveTo(Math.round(x) + 0.5, 0);
      ctx.lineTo(Math.round(x) + 0.5, h);
    }
    const startY2 = (oy % largeStep + largeStep) % largeStep;
    for (let y = startY2; y < h; y += largeStep) {
      ctx.moveTo(0, Math.round(y) + 0.5);
      ctx.lineTo(w, Math.round(y) + 0.5);
    }
    ctx.stroke();
  }
}

/* ============================================================
   节点容器 transform 同步
   ============================================================ */
function syncNodeContainerTransform() {
  $nodeContainer.style.transform =
    `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
}

/* ============================================================
   统一刷新
   ============================================================ */
function onResize() {
  resizeCanvases();
  drawGrid();
  syncNodeContainerTransform();
  drawConnections();
}

window.addEventListener('resize', onResize);

/* ============================================================
   画布平移与缩放
   ============================================================ */

// --- 刷新画布（平移/缩放后调用）---
function refreshCanvas() {
  drawGrid();
  syncNodeContainerTransform();
  drawConnections();
}

function getCanvasPoint(clientX, clientY) {
  const rect = $canvasArea.getBoundingClientRect();
  return {
    x: (clientX - rect.left - state.panX) / state.zoom,
    y: (clientY - rect.top - state.panY) / state.zoom,
  };
}

function getCanvasLocalPoint(clientX, clientY) {
  const rect = $canvasArea.getBoundingClientRect();
  return {
    x: clientX - rect.left,
    y: clientY - rect.top,
  };
}

// --- 中键拖拽平移 ---
let midDragging = false;
let midStartX = 0, midStartY = 0;
let midStartPanX = 0, midStartPanY = 0;

$canvasArea.addEventListener('mousedown', (e) => {
  if (e.button !== 1) return; // 中键
  e.preventDefault();
  midDragging = true;
  midStartX = e.clientX;
  midStartY = e.clientY;
  midStartPanX = state.panX;
  midStartPanY = state.panY;
  $canvasArea.style.cursor = 'grabbing';
});

// --- 右键拖拽平移（>3px 才判定为拖拽） ---
let rightDown = false;
let rightDragging = false;
let rightStartX = 0, rightStartY = 0;
let rightStartPanX = 0, rightStartPanY = 0;

$canvasArea.addEventListener('mousedown', (e) => {
  if (e.button !== 2) return; // 右键
  closeContextMenu();
  e.preventDefault();
  rightDown = true;
  rightDragging = false;
  rightStartX = e.clientX;
  rightStartY = e.clientY;
  rightStartPanX = state.panX;
  rightStartPanY = state.panY;
});

// --- 共用 mousemove ---
window.addEventListener('mousemove', (e) => {
  // 中键拖拽
  if (midDragging) {
    state.panX = midStartPanX + (e.clientX - midStartX);
    state.panY = midStartPanY + (e.clientY - midStartY);
    refreshCanvas();
  }

  // 右键拖拽
  if (rightDown) {
    const dx = e.clientX - rightStartX;
    const dy = e.clientY - rightStartY;
    if (!rightDragging && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
      rightDragging = true;
      $canvasArea.style.cursor = 'grabbing';
    }
    if (rightDragging) {
      state.panX = rightStartPanX + dx;
      state.panY = rightStartPanY + dy;
      refreshCanvas();
    }
  }
});

// --- 共用 mouseup ---
window.addEventListener('mouseup', (e) => {
  if (e.button === 1 && midDragging) {
    midDragging = false;
    $canvasArea.style.cursor = '';
  }
  if (e.button === 2 && rightDown) {
    rightDown = false;
    if (suppressNextContextMenu) {
      suppressNextContextMenu = false;
      rightDragging = false;
      return;
    }
    if (rightDragging) {
      $canvasArea.style.cursor = '';
    } else {
      const nodeEl = e.target.closest('.bt-node');
      const localPoint = getCanvasLocalPoint(e.clientX, e.clientY);
      const connection = nodeEl ? null : hitTestConnections(localPoint);

      if (nodeEl) {
        const nodeId = nodeEl.dataset.nodeId;
        selectNode(nodeId);
        const node = treeData.nodes[nodeId];
        const reg = NODE_TYPES[node?.type];
        openContextMenu(e.clientX, e.clientY, [
          { label: treeData.root === nodeId ? I18N.rootNode : I18N.setAsRoot, disabled: treeData.root === nodeId, onClick: () => setNodeRoot(nodeId) },
          { label: I18N.duplicate, onClick: () => { const dup = duplicateNode(nodeId); if (dup) selectNode(dup.id); } },
          { label: I18N.copyToClipboard, onClick: () => { nodeClipboard = serializeNodesForClipboard([nodeId]); } },
          { label: I18N.cut, onClick: () => { nodeClipboard = serializeNodesForClipboard([nodeId]); deleteNode(nodeId); } },
          { label: I18N.expandCollapse, disabled: !reg?.expandable, onClick: () => toggleNodeExpand(nodeId) },
          { label: I18N.pasteProps, disabled: !nodeClipboard || nodeClipboard.length !== 1 || nodeClipboard[0].type !== node?.type, onClick: () => applyNodePropertiesFromClipboard(nodeId) },
          { separator: true },
          { label: I18N.disconnectAll, onClick: () => disconnectAllForNode(nodeId) },
          { label: I18N.delete_, onClick: () => deleteNode(nodeId) },
        ]);
      } else if (connection) {
        state.hoveredConnection = connection;
        drawConnections();
        openContextMenu(e.clientX, e.clientY, [
          { label: I18N.deleteConnection, onClick: () => removeConnection(connection.sourceId, connection.targetId) },
        ]);
      } else {
        openContextMenu(e.clientX, e.clientY, [
          { label: getNodeDisplayName('Sequence'), onClick: () => { const p = getCanvasPoint(e.clientX, e.clientY); addNodeToCanvas('Sequence', Math.round(p.x - 80), Math.round(p.y - 20)); } },
          { label: getNodeDisplayName('Repeat'), onClick: () => { const p = getCanvasPoint(e.clientX, e.clientY); addNodeToCanvas('Repeat', Math.round(p.x - 80), Math.round(p.y - 20)); } },
          { label: getNodeDisplayName('InjectInput'), onClick: () => { const p = getCanvasPoint(e.clientX, e.clientY); addNodeToCanvas('InjectInput', Math.round(p.x - 80), Math.round(p.y - 20)); } },
          { label: getNodeDisplayName('CheckHP'), onClick: () => { const p = getCanvasPoint(e.clientX, e.clientY); addNodeToCanvas('CheckHP', Math.round(p.x - 80), Math.round(p.y - 20)); } },
          { separator: true },
          { label: I18N.addNode, submenu: getAddNodeSubmenu(e.clientX, e.clientY) },
          { label: I18N.paste, disabled: !nodeClipboard, onClick: () => pasteNodeFromClipboard(e.clientX, e.clientY) },
          { label: I18N.fitView, onClick: () => fitViewToNodes() },
        ]);
      }
    }
    // rightDragging === false 时表示是右键点击（未拖拽），后续步骤处理右键菜单
    rightDragging = false;
  }
});

// --- 禁用画布区域右键默认菜单 ---

});

// --- 滚轮缩放（朝鼠标位置） ---
const ZOOM_MIN = 0.2;
const ZOOM_MAX = 3.0;
const ZOOM_FACTOR = 0.001;

$canvasArea.addEventListener('wheel', (e) => {
  e.preventDefault();

  const oldZoom = state.zoom;
  // 缩放系数：向上滚放大，向下滚缩小
  const delta = -e.deltaY * ZOOM_FACTOR;
  let newZoom = oldZoom * (1 + delta);
  newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newZoom));

  // 鼠标在画布区域内的坐标
  const rect = $canvasArea.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // 缩放中心：保持鼠标指向的画布坐标不变
  state.panX = mx - (mx - state.panX) * (newZoom / oldZoom);
  state.panY = my - (my - state.panY) * (newZoom / oldZoom);
  state.zoom = newZoom;

  refreshCanvas();
}, { passive: false });

// --- 防止中键点击自动滚动 ---
$canvasArea.addEventListener('auxclick', (e) => {
  if (e.button === 1) e.preventDefault();
});

/* ============================================================
   树数据模型
   ============================================================ */
let nextNodeId = 1;

const treeData = {
  name: '未命名',
  description: '',
  root: null,
  nodes: {},          // id -> node data
  onComplete: 'restart',
};

const undoStack = [];
const redoStack = [];
const UNDO_LIMIT = 50;
let isRestoringHistory = false;
let paletteDrag = null;
let suppressNextPaletteClick = false;
let nodeClipboard = null;
const GRID_SIZE = 40;
let snapEnabled = true;
let lastMouseClientX = 0;
let lastMouseClientY = 0;
const AUTOSAVE_KEY = 'utr_editor_autosave_v1';
let autosaveTimer = null;
let recoveredAutosave = null;
let validationIssues = [];
let validationRefreshTimer = null;
let suppressNextContextMenu = false;

function generateId() {
  return 'node_' + (nextNodeId++);
}

function createSnapshot() {
  return JSON.parse(JSON.stringify({
    treeData,
    nextNodeId,
    viewport: {
      panX: state.panX,
      panY: state.panY,
      zoom: state.zoom,
      selectedNodeIds: state.selectedNodeIds,
    },
  }));
}

function serializeNodesForClipboard(nodeIds) {
  const ids = [...new Set(nodeIds)].filter((id) => treeData.nodes[id]);
  if (!ids.length) return null;
  return ids.map((id) => JSON.parse(JSON.stringify(treeData.nodes[id])));
}

function getPasteAnchorPoint(clientX = lastMouseClientX, clientY = lastMouseClientY) {
  const canvasRect = $canvasArea.getBoundingClientRect();
  const insideCanvas =
    clientX >= canvasRect.left && clientX <= canvasRect.right &&
    clientY >= canvasRect.top && clientY <= canvasRect.bottom;
  if (insideCanvas) return getCanvasPoint(clientX, clientY);
  return getCanvasPoint(canvasRect.left + canvasRect.width / 2, canvasRect.top + canvasRect.height / 2);
}

function buildAutosavePayload() {
  return {
    treeData: JSON.parse(JSON.stringify(treeData)),
    nextNodeId,
    viewport: {
      panX: state.panX,
      panY: state.panY,
      zoom: state.zoom,
      selectedNodeIds: state.selectedNodeIds,
    },
    savedAt: Date.now(),
  };
}

function writeAutosaveNow() {
  try {
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(buildAutosavePayload()));
  } catch {}
}

function scheduleAutosave() {
  if (isRestoringHistory) return;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(writeAutosaveNow, 500);
}

function clearAutosave() {
  clearTimeout(autosaveTimer);
  try {
    localStorage.removeItem(AUTOSAVE_KEY);
  } catch {}
}

function showRecoveryBanner(show) {
  $recoveryBanner.classList.toggle('open', show);
}

function applyAutosavePayload(payload) {
  if (!payload) return;
  applySnapshot({
    treeData: payload.treeData,
    nextNodeId: payload.nextNodeId,
    viewport: payload.viewport,
  });
}

function applySnapshot(snapshot) {
  isRestoringHistory = true;
  const preservedSelectedId = state.selectedNodeId;

  for (const id of Object.keys(nodeDomMap)) removeNodeDom(id);
  for (const key of Object.keys(treeData)) delete treeData[key];
  Object.assign(treeData, JSON.parse(JSON.stringify(snapshot.treeData)));
  nextNodeId = snapshot.nextNodeId;

  state.panX = snapshot.viewport.panX;
  state.panY = snapshot.viewport.panY;
  state.zoom = snapshot.viewport.zoom;
  state.selectedNodeId = null;
  state.selectedNodeIds = [];
  state.connectionDrag = null;
  state.hoveredConnection = null;
  state.hoveredPort = null;
  state.marquee = null;

  for (const node of Object.values(treeData.nodes)) {
    renderNode(node);
  }

  onResize();

  const restoredSelectedIds = (snapshot.viewport.selectedNodeIds || []).filter((id) => treeData.nodes[id]);
  if (restoredSelectedIds.length) setSelectedNodes(restoredSelectedIds);
  else if (preservedSelectedId && treeData.nodes[preservedSelectedId]) selectNode(preservedSelectedId);
  else renderRightPanelPlaceholder();

  updateHistoryButtons();
  isRestoringHistory = false;
}

function pushUndoSnapshot(snapshot = createSnapshot()) {
  if (isRestoringHistory) return;
  undoStack.push(snapshot);
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack.length = 0;
  updateHistoryButtons();
  scheduleAutosave();
}

function updateHistoryButtons() {
  const undoDisabled = undoStack.length === 0;
  const redoDisabled = redoStack.length === 0;
  $btnUndo.classList.toggle('disabled', undoDisabled);
  $btnRedo.classList.toggle('disabled', redoDisabled);
  $btnUndo.disabled = undoDisabled;
  $btnRedo.disabled = redoDisabled;
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(createSnapshot());
  applySnapshot(undoStack.pop());
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(createSnapshot());
  applySnapshot(redoStack.pop());
}

function isNodeEnabled(nodeData) {
  return !!nodeData && nodeData.enabled !== false;
}

function setNodeEnabled(id, enabled, options = {}) {
  const node = treeData.nodes[id];
  if (!node) return;
  if (!options.skipHistory && isNodeEnabled(node) !== !!enabled && !(treeData.root === id && enabled === false)) {
    pushUndoSnapshot();
  }
  if (treeData.root === id) {
    node.enabled = true;
  } else {
    node.enabled = !!enabled;
  }
  updateNodeEnabledState(id);
  if (state.selectedNodeId === id) renderRightPanelSelection(id);
  scheduleValidationRefresh();
}

function setNodesEnabled(ids, enabled) {
  const targets = ids.map((id) => treeData.nodes[id]).filter(Boolean);
  const effectiveTargets = targets.filter((node) => treeData.root !== node.id);
  if (!effectiveTargets.length) return false;
  const changed = effectiveTargets.some((node) => isNodeEnabled(node) !== !!enabled);
  if (!changed) return false;
  pushUndoSnapshot();
  effectiveTargets.forEach((node) => {
    node.enabled = !!enabled;
    updateNodeEnabledState(node.id);
  });
  setSelectedNodes(ids);
  scheduleValidationRefresh();
  return true;
}

function applyPropertyToNodes(ids, key, value) {
  const nodes = ids.map((id) => treeData.nodes[id]).filter(Boolean);
  if (!nodes.length) return false;
  const changed = nodes.some((node) => node.properties[key] !== value);
  if (!changed) return false;
  pushUndoSnapshot();
  nodes.forEach((node) => {
    node.properties[key] = value;
    updateNodeSummary(node.id);
    syncPropertyControls(node.id, key, 'panel');
  });
  setSelectedNodes(ids);
  scheduleValidationRefresh();
  return true;
}

function closeAllCustomSelects(exceptControl) {
  document.querySelectorAll('.bt-node-prop-select.open').forEach((el) => {
    if (el !== exceptControl) el.classList.remove('open');
  });
}

function createNodeData(type, x, y) {
  const reg = NODE_TYPES[type];
  if (!reg) return null;

  const id = generateId();
  const properties = {};
  for (const p of reg.props) {
    properties[p.key] = p.default;
  }

  const node = {
    id,
    type,
    category: reg.category,
    enabled: true,
    properties,
    children: [],
    display: { x, y, collapsed: true },
  };

  treeData.nodes[id] = node;
  return node;
}

function deleteNodeData(id) {
  // 从所有父节点的 children 中移除
  for (const n of Object.values(treeData.nodes)) {
    const idx = n.children.indexOf(id);
    if (idx !== -1) n.children.splice(idx, 1);
  }
  // 如果是 root
  if (treeData.root === id) treeData.root = null;
  // 删除
  delete treeData.nodes[id];
}

function deleteNode(id, options = {}) {
  if (!treeData.nodes[id]) return false;
  if (!options.skipHistory) pushUndoSnapshot();
  if (state.selectedNodeId === id) state.selectedNodeId = null;
  state.selectedNodeIds = (state.selectedNodeIds || []).filter((nodeId) => nodeId !== id);
  deleteNodeData(id);
  removeNodeDom(id);
  renderRightPanelPlaceholder();
  state.hoveredConnection = null;
  state.hoveredPort = null;
  drawConnections();
  scheduleValidationRefresh();
  return true;
}

function deleteSelectedNodes() {
  const ids = [...(state.selectedNodeIds || [])].filter((id) => treeData.nodes[id]);
  if (!ids.length) return false;
  pushUndoSnapshot();
  ids.forEach((id) => deleteNode(id, { skipHistory: true }));
  setSelectedNodes([]);
  return true;
}

function duplicateNode(id, x = null, y = null) {
  const source = treeData.nodes[id];
  if (!source) return null;
  nodeClipboard = serializeNodesForClipboard([id]);
  const anchor = x == null || y == null ? getPasteAnchorPoint() : { x, y };
  const node = addNodeToCanvas(source.type, x ?? Math.round(anchor.x - 80), y ?? Math.round(anchor.y - 20));
  if (!node) return null;
  node.enabled = source.enabled !== false;
  node.properties = JSON.parse(JSON.stringify(source.properties));
  node.display.collapsed = source.display.collapsed;
  updateNodeEnabledState(node.id);
  updateNodeSummary(node.id);
  const el = nodeDomMap[node.id];
  if (el) {
    if (node.display.collapsed === false) el.classList.add('expanded');
    const toggle = el.querySelector('.bt-node-toggle');
    if (toggle) toggle.textContent = node.display.collapsed ? '▶' : '▼';
  }
  return node;
}

/* ============================================================
   节点 DOM 渲染
   ============================================================ */
const nodeDomMap = {};  // id -> DOM element

function getPortScreenPosition(portEl) {
  if (!portEl) return null;
  const portRect = portEl.getBoundingClientRect();
  const canvasRect = $canvasArea.getBoundingClientRect();
  return {
    x: portRect.left + portRect.width / 2 - canvasRect.left,
    y: portRect.top + portRect.height / 2 - canvasRect.top,
  };
}

function getNodePortPosition(nodeId, portType) {
  const el = nodeDomMap[nodeId];
  if (!el) return null;
  const portEl = el.querySelector(`.bt-port-${portType}`);
  return getPortScreenPosition(portEl);
}

function getConnectionStrokeColor(node) {
  const cat = CATEGORIES[node?.category];
  return cat?.color || '#3a3a55';
}

function getBezierControlPoints(from, to) {
  const dy = Math.max(60, Math.abs(to.y - from.y) * 0.5);
  return {
    cp1x: from.x,
    cp1y: from.y + dy,
    cp2x: to.x,
    cp2y: to.y - dy,
  };
}

function drawConnectionLabel(ctx, from, to, index) {
  const t = 0.5;
  const { cp1x, cp1y, cp2x, cp2y } = getBezierControlPoints(from, to);
  const x =
    Math.pow(1 - t, 3) * from.x +
    3 * Math.pow(1 - t, 2) * t * cp1x +
    3 * (1 - t) * Math.pow(t, 2) * cp2x +
    Math.pow(t, 3) * to.x;
  const y =
    Math.pow(1 - t, 3) * from.y +
    3 * Math.pow(1 - t, 2) * t * cp1y +
    3 * (1 - t) * Math.pow(t, 2) * cp2y +
    Math.pow(t, 3) * to.y;

  ctx.fillStyle = '#6c6c8a';
  ctx.font = '18px Segoe UI';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(index + 1), x, y - 14);
}

function getBezierPoint(from, to, t) {
  const { cp1x, cp1y, cp2x, cp2y } = getBezierControlPoints(from, to);
  return {
    x:
      Math.pow(1 - t, 3) * from.x +
      3 * Math.pow(1 - t, 2) * t * cp1x +
      3 * (1 - t) * Math.pow(t, 2) * cp2x +
      Math.pow(t, 3) * to.x,
    y:
      Math.pow(1 - t, 3) * from.y +
      3 * Math.pow(1 - t, 2) * t * cp1y +
      3 * (1 - t) * Math.pow(t, 2) * cp2y +
      Math.pow(t, 3) * to.y,
  };
}

function drawConnectionFlow(ctx, from, to, color) {
  const t = (performance.now() % 2000) / 2000;
  const point = getBezierPoint(from, to, t);
  ctx.beginPath();
  ctx.arc(point.x, point.y, 2, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function getConnectionRecords() {
  const records = [];
  for (const node of Object.values(treeData.nodes)) {
    const from = getNodePortPosition(node.id, 'out');
    if (!from) continue;
    node.children.forEach((childId, index) => {
      const to = getNodePortPosition(childId, 'in');
      if (!to) return;
      records.push({
        sourceId: node.id,
        targetId: childId,
        index,
        siblingCount: node.children.length,
        from,
        to,
        color: getConnectionStrokeColor(node),
      });
    });
  }
  return records;
}

function isSameConnection(a, b) {
  return !!a && !!b && a.sourceId === b.sourceId && a.targetId === b.targetId;
}

function distanceToSegmentSquared(point, a, b) {
  const abx = b.x - a.x;
  const aby = b.y - a.y;
  const apx = point.x - a.x;
  const apy = point.y - a.y;
  const abLenSq = abx * abx + aby * aby;
  if (!abLenSq) return apx * apx + apy * apy;
  const t = Math.max(0, Math.min(1, (apx * abx + apy * aby) / abLenSq));
  const projX = a.x + abx * t;
  const projY = a.y + aby * t;
  const dx = point.x - projX;
  const dy = point.y - projY;
  return dx * dx + dy * dy;
}

function hitTestConnections(localPoint) {
  const records = getConnectionRecords();
  let best = null;
  let bestDistSq = 100;

  for (const record of records) {
    let prev = getBezierPoint(record.from, record.to, 0);
    for (let i = 1; i <= 24; i++) {
      const t = i / 24;
      const next = getBezierPoint(record.from, record.to, t);
      const distSq = distanceToSegmentSquared(localPoint, prev, next);
      if (distSq < bestDistSq) {
        bestDistSq = distSq;
        best = {
          sourceId: record.sourceId,
          targetId: record.targetId,
        };
      }
      prev = next;
    }
  }

  return best;
}

function removeConnection(sourceId, targetId, options = {}) {
  const source = treeData.nodes[sourceId];
  if (!source) return false;
  const before = source.children.length;
  if (before === source.children.filter((id) => id !== targetId).length) return false;
  if (!options.skipHistory) pushUndoSnapshot();
  source.children = source.children.filter((id) => id !== targetId);
  if (state.hoveredConnection && state.hoveredConnection.sourceId === sourceId && state.hoveredConnection.targetId === targetId) {
    state.hoveredConnection = null;
  }
  drawConnections();
  if (state.selectedNodeId === sourceId || state.selectedNodeId === targetId) {
    renderRightPanelSelection(state.selectedNodeId);
  }
  scheduleValidationRefresh();
  return true;
}

function beginPropertyHistory(control) {
  if (isRestoringHistory) return;
  if (control.dataset.historyPrimed === '1') return;
  pushUndoSnapshot();
  control.dataset.historyPrimed = '1';
}

function endPropertyHistory(control) {
  delete control.dataset.historyPrimed;
}

function moveChildNode(parentId, fromIndex, toIndex) {
  const parent = treeData.nodes[parentId];
  if (!parent) return false;
  if (fromIndex === toIndex) return false;
  if (fromIndex < 0 || toIndex < 0 || fromIndex >= parent.children.length || toIndex >= parent.children.length) return false;
  pushUndoSnapshot();
  const [childId] = parent.children.splice(fromIndex, 1);
  parent.children.splice(toIndex, 0, childId);
  drawConnections();
  if (state.selectedNodeId === parentId) renderRightPanelSelection(parentId);
  return true;
}

function reorderChildNode(parentId, fromIndex, toIndex) {
  const parent = treeData.nodes[parentId];
  if (!parent) return false;
  if (fromIndex < 0 || toIndex < 0 || fromIndex >= parent.children.length || toIndex >= parent.children.length) return false;
  if (fromIndex === toIndex) return false;
  pushUndoSnapshot();
  const [childId] = parent.children.splice(fromIndex, 1);
  parent.children.splice(toIndex, 0, childId);
  drawConnections();
  if (state.selectedNodeId === parentId) renderRightPanelSelection(parentId);
  return true;
}

function clearChildDropIndicators(host) {
  if (!host) return;
  host.querySelectorAll('.inspector-child-item').forEach((el) => el.classList.remove('dragging'));
  const line = host.querySelector('.inspector-drop-line');
  if (line) line.style.display = 'none';
}

let childReorderDrag = null;
const CHILD_DRAG_THRESHOLD = 4;

function getChildDropPlacement(host, clientY) {
  const items = [...host.querySelectorAll('.inspector-child-item')];
  for (const item of items) {
    const rect = item.getBoundingClientRect();
    const index = Number(item.dataset.childIndex);
    if (clientY < rect.top + rect.height / 2) {
      return { item, index, before: true };
    }
    if (clientY <= rect.bottom) {
      return { item, index, before: false };
    }
  }
  const lastItem = items[items.length - 1] || null;
  return lastItem ? { item: lastItem, index: Number(lastItem.dataset.childIndex), before: false } : null;
}

function showChildDropIndicator(host, placement) {
  const line = host?.querySelector('.inspector-drop-line');
  if (!host || !line || !placement) return;
  const hostRect = host.getBoundingClientRect();
  const itemRect = placement.item.getBoundingClientRect();
  const gapOffset = 4;
  const top = placement.before
    ? Math.max(0, itemRect.top - hostRect.top - gapOffset)
    : itemRect.bottom - hostRect.top + gapOffset;
  line.style.top = `${Math.round(top)}px`;
  line.style.display = 'block';
}

function beginChildReorderDrag(parentId, fromIndex, itemEl, host, clientY) {
  childReorderDrag = {
    parentId,
    fromIndex,
    itemEl,
    host,
    startY: clientY,
    active: false,
    placement: null,
  };
}

function updateChildReorderDrag(clientY) {
  if (!childReorderDrag) return;
  const drag = childReorderDrag;
  if (!drag.active) {
    if (Math.abs(clientY - drag.startY) < CHILD_DRAG_THRESHOLD) return;
    drag.active = true;
    drag.itemEl.classList.add('dragging');
    document.body.classList.add('dragging-children');
  }

  clearChildDropIndicators(drag.host);
  drag.itemEl.classList.add('dragging');
  const placement = getChildDropPlacement(drag.host, clientY);
  if (!placement) {
    drag.placement = null;
    return;
  }

  let toIndex = placement.before ? placement.index : placement.index + 1;
  if (drag.fromIndex < toIndex) toIndex -= 1;
  const maxIndex = drag.host.querySelectorAll('.inspector-child-item').length - 1;
  toIndex = Math.max(0, Math.min(maxIndex, toIndex));

  drag.placement = { ...placement, toIndex };
  if (toIndex !== drag.fromIndex) {
    showChildDropIndicator(drag.host, placement);
  }
}

function finishChildReorderDrag() {
  if (!childReorderDrag) return;
  const drag = childReorderDrag;
  const placement = drag.placement;
  const shouldReorder = drag.active && placement && placement.toIndex !== drag.fromIndex;
  clearChildDropIndicators(drag.host);
  document.body.classList.remove('dragging-children');
  childReorderDrag = null;
  if (shouldReorder) {
    reorderChildNode(drag.parentId, drag.fromIndex, placement.toIndex);
  }
}

function updateTreeField(key, value) {

function createInspectorTextControl(value, options = {}) {

function createInspectorSelectControl(value, selectOptions, onChange) {
  const control = document.createElement('div');
  control.className = 'bt-node-prop-select';
  control.dataset.controlType = 'custom-select';
  const button = document.createElement('button');
  button.type = 'button';
  button.className = 'bt-node-prop-select-btn';
  button.textContent = value ?? '';
  const menu = document.createElement('div');
  menu.className = 'bt-node-prop-select-menu';

  for (const opt of selectOptions) {
    const optionBtn = document.createElement('button');
    optionBtn.type = 'button';
    optionBtn.className = 'bt-node-prop-select-option';
    optionBtn.textContent = opt;
    optionBtn.dataset.optionValue = opt;
    if (value == opt) optionBtn.classList.add('active');
    optionBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (button.textContent !== opt) pushUndoSnapshot();
      updateCustomSelectControl(control, opt);
      onChange(opt);
      control.classList.remove('open');
    });
    menu.appendChild(optionBtn);
  }

  button.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const willOpen = !control.classList.contains('open');
    closeAllCustomSelects(control);
    control.classList.toggle('open', willOpen);
  });

  control.appendChild(menu);
  return control;
