function fitViewToNodes() {
  const nodes = Object.values(treeData.nodes);
  if (!nodes.length) {
    state.panX = 0;
    state.panY = 0;
    state.zoom = 1;
    refreshCanvas();
    return;
  }
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const node of nodes) {
    const height = node.display.collapsed === false ? 120 : 60;
    minX = Math.min(minX, node.display.x);
    minY = Math.min(minY, node.display.y);
    maxX = Math.max(maxX, node.display.x + 160);
    maxY = Math.max(maxY, node.display.y + height);
  }
  const rect = $canvasArea.getBoundingClientRect();
  const contentW = Math.max(1, maxX - minX + 80);
  const contentH = Math.max(1, maxY - minY + 80);
  const zoomX = rect.width / contentW;
  const zoomY = rect.height / contentH;
  state.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.min(zoomX, zoomY)));
  state.panX = rect.width / 2 - ((minX + maxX) / 2) * state.zoom;
  state.panY = rect.height / 2 - ((minY + maxY) / 2) * state.zoom;
  refreshCanvas();
}

function getLayoutNodeHeight(node) {
  return node.display?.collapsed === false ? 120 : 60;
}

function autoLayoutTree() {
  const rootId = treeData.root;
  const root = treeData.nodes[rootId];
  if (!root) return false;

  const levelHeight = 160;
  const siblingGap = 80;
  const nodeWidth = 160;
  const visited = new Set();

  function measureSubtree(nodeId) {
    const node = treeData.nodes[nodeId];
    if (!node || visited.has(nodeId)) return nodeWidth;
    visited.add(nodeId);
    const childIds = node.children.filter((id) => treeData.nodes[id]);
    if (!childIds.length) return nodeWidth;
    let total = 0;
    childIds.forEach((childId, index) => {
      total += measureSubtree(childId);
      if (index < childIds.length - 1) total += siblingGap;
    });
    return Math.max(nodeWidth, total);
  }

  const subtreeWidths = {};
  Object.keys(treeData.nodes).forEach((nodeId) => {
    visited.clear();
    subtreeWidths[nodeId] = measureSubtree(nodeId);
  });

  function layoutNode(nodeId, centerX, y) {
    const node = treeData.nodes[nodeId];
    if (!node) return;
    node.display.x = Math.round(centerX - nodeWidth / 2);
    node.display.y = Math.round(y);
    const childIds = node.children.filter((id) => treeData.nodes[id]);
    if (!childIds.length) return;

    const totalWidth = childIds.reduce((sum, childId, index) => {
      return sum + subtreeWidths[childId] + (index < childIds.length - 1 ? siblingGap : 0);
    }, 0);

    let cursorX = centerX - totalWidth / 2;
    childIds.forEach((childId) => {
      const childCenterX = cursorX + subtreeWidths[childId] / 2;
      layoutNode(childId, childCenterX, y + levelHeight);
      cursorX += subtreeWidths[childId] + siblingGap;
    });
  }

  pushUndoSnapshot();
  layoutNode(rootId, 0, 0);

  Object.keys(treeData.nodes).forEach((nodeId) => updateNodePosition(nodeId));
  fitViewToNodes();
  scheduleAutosave();
  return true;
}

function applyGridSnapToNodes(ids, disableSnap) {
  if (!snapEnabled || disableSnap) return;
  ids.forEach((nodeId) => {
    const node = treeData.nodes[nodeId];
    if (!node) return;
    node.display.x = Math.round(node.display.x / GRID_SIZE) * GRID_SIZE;
    node.display.y = Math.round(node.display.y / GRID_SIZE) * GRID_SIZE;
    updateNodePosition(nodeId);
  });
}

function isMissingRequiredProperty(node, propDef) {
  const value = node.properties?.[propDef.key];
  if (propDef.type === 'checkbox') return false;
  if (propDef.type === 'number') return value == null || Number.isNaN(value);
  return value == null || value === '';
}

function validateTree() {
  const issues = [];
  const reachable = new Set();

  function dfs(nodeId, path = new Set()) {
    if (!treeData.nodes[nodeId]) return;
    if (path.has(nodeId)) {
      issues.push({ type: 'error', nodeId, message: '检测到循环引用' });
      return;
    }
    path.add(nodeId);
    reachable.add(nodeId);
    const node = treeData.nodes[nodeId];
    node.children.forEach((childId) => dfs(childId, new Set(path)));
  }

  if (treeData.root) dfs(treeData.root);

  reachable.forEach((nodeId) => {
    const node = treeData.nodes[nodeId];
    if (!node) return;
    const reg = NODE_TYPES[node.type];
    if (reg?.maxChildren === 1 && node.children.length === 0) {
      issues.push({ type: 'warning', nodeId: node.id, message: 'Decorator 节点缺少子节点' });
    }
    (reg?.props || []).forEach((propDef) => {
      if (isMissingRequiredProperty(node, propDef)) {
        issues.push({ type: 'warning', nodeId: node.id, message: `缺少必填属性：${propDef.label}` });
      }
    });
  });

  validationIssues = issues;
  applyValidationMarkers();
  return issues;
}

function renderValidationPanelList() {
  $validationPanelList.innerHTML = '';
  validationIssues.forEach((issue) => {
    const item = document.createElement('div');
    item.className = `validation-item ${issue.type}`;
    const node = treeData.nodes[issue.nodeId];
    item.innerHTML = `
      <div class="validation-item-title">${issue.message}</div>
      <div class="validation-item-meta">${node ? getNodeDisplayName(node.type) : issue.nodeId} · ${issue.nodeId}</div>
    `;
    item.addEventListener('click', () => {
      const target = treeData.nodes[issue.nodeId];
      if (!target) return;
      selectNode(issue.nodeId);
      const rect = $canvasArea.getBoundingClientRect();
      state.panX = rect.width / 2 - (target.display.x + 80) * state.zoom;
      state.panY = rect.height / 2 - (target.display.y + 30) * state.zoom;
      refreshCanvas();
    });
    $validationPanelList.appendChild(item);
  });
}

function scheduleValidationRefresh() {
  clearTimeout(validationRefreshTimer);
  validationRefreshTimer = setTimeout(() => {
    validateTree();
    if ($validationPanel.classList.contains('open')) {
      renderValidationPanelList();
    }
  }, 0);
}

function applyValidationMarkers() {
  Object.keys(nodeDomMap).forEach((nodeId) => {
    const el = nodeDomMap[nodeId];
    if (!el) return;
    el.classList.remove('has-validation');
    const marker = el.querySelector('.bt-node-validation');
    if (marker) marker.remove();
  });

  const grouped = {};
  validationIssues.forEach((issue) => {
    grouped[issue.nodeId] ||= [];
    grouped[issue.nodeId].push(issue);
  });

  Object.entries(grouped).forEach(([nodeId, issues]) => {
    const el = nodeDomMap[nodeId];
    if (!el) return;
    const marker = document.createElement('div');
    marker.className = 'bt-node-validation ' + (issues.some((issue) => issue.type === 'error') ? 'error' : 'warning');
    el.appendChild(marker);
    el.classList.add('has-validation');
  });
}

function openValidationPanel() {
  validateTree();
  renderValidationPanelList();
  $validationPanel.classList.add('open');
}

function closeValidationPanel() {
  $validationPanel.classList.remove('open');
}

function openHelpOverlay() {
  $helpOverlay.classList.add('open');
}

function closeHelpOverlay() {
  $helpOverlay.classList.remove('open');
}

function disconnectAllForNode(nodeId) {
  const node = treeData.nodes[nodeId];
  if (!node) return false;
  const parentId = findParentNodeId(nodeId);
  const childIds = [...node.children];
  if (!parentId && !childIds.length) return false;
  pushUndoSnapshot();
  if (parentId) removeConnection(parentId, nodeId, { skipHistory: true });
  for (const childId of childIds) {
    removeConnection(nodeId, childId, { skipHistory: true });
  }
  if (state.selectedNodeId === nodeId) renderRightPanelSelection(nodeId);
  return true;
}

function applyNodePropertiesFromClipboard(nodeId) {
  const node = treeData.nodes[nodeId];
  if (!node || !nodeClipboard || nodeClipboard.length !== 1 || nodeClipboard[0].type !== node.type) return false;
  const source = nodeClipboard[0];
  pushUndoSnapshot();
  node.properties = JSON.parse(JSON.stringify(source.properties));
  if (treeData.root !== nodeId) node.enabled = source.enabled !== false;
  updateNodeEnabledState(nodeId);
  updateNodeSummary(nodeId);
  if (state.selectedNodeId === nodeId) renderRightPanelSelection(nodeId);
  scheduleValidationRefresh();
  return true;
}

function copySelectionToClipboard() {
  const ids = (state.selectedNodeIds?.length ? state.selectedNodeIds : (state.selectedNodeId ? [state.selectedNodeId] : []));
  const data = serializeNodesForClipboard(ids);
  if (!data) return false;
  nodeClipboard = data;
  return true;
}

function pasteNodeFromClipboard(clientX, clientY) {
  if (!nodeClipboard?.length) return false;
  const point = getPasteAnchorPoint(clientX, clientY);
  const createdIds = [];
  const baseX = Math.round(point.x - 80);
  const baseY = Math.round(point.y - 20);
  const sourceMinX = Math.min(...nodeClipboard.map((node) => node.display.x));
  const sourceMinY = Math.min(...nodeClipboard.map((node) => node.display.y));

  pushUndoSnapshot();
  nodeClipboard.forEach((source, index) => {
    const x = baseX + (source.display.x - sourceMinX);
    const y = baseY + (source.display.y - sourceMinY);
    const node = addNodeToCanvas(source.type, x, y, { skipHistory: true });
    if (!node) return;
    node.enabled = source.enabled !== false;
    node.properties = JSON.parse(JSON.stringify(source.properties));
    node.display.collapsed = source.display?.collapsed ?? true;
    updateNodeEnabledState(node.id);
    updateNodeSummary(node.id);
    const el = nodeDomMap[node.id];
    if (el && node.display.collapsed === false) el.classList.add('expanded');
    if (el) {
      const toggle = el.querySelector('.bt-node-toggle');
      if (toggle) toggle.textContent = node.display.collapsed ? '▶' : '▼';
    }
    createdIds.push(node.id);
  });
  setSelectedNodes(createdIds);
  return createdIds.length > 0;
}

function createContextMenuItem(def) {
  if (def.separator) {
    const sep = document.createElement('div');
    sep.className = 'context-menu-separator';
    return sep;
  }
  const item = document.createElement('div');
  item.className = 'context-menu-item' + (def.disabled ? ' disabled' : '');
  const label = document.createElement('span');
  label.textContent = def.label;
  item.appendChild(label);
  if (def.submenu?.length) {
    const arrow = document.createElement('span');
    arrow.className = 'context-menu-arrow';
    arrow.textContent = '▶';
    item.appendChild(arrow);
    const submenu = document.createElement('div');
    submenu.className = 'context-submenu';
    def.submenu.forEach((sub) => submenu.appendChild(createContextMenuItem(sub)));
    item.appendChild(submenu);
  } else if (!def.disabled && def.onClick) {
    item.addEventListener('click', () => {
      closeContextMenu();
      def.onClick();
    });
  }
  return item;
}

function openContextMenu(clientX, clientY, items) {
  $contextMenu.innerHTML = '';
  items.forEach((item) => $contextMenu.appendChild(createContextMenuItem(item)));
  $contextMenu.classList.add('open');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  requestAnimationFrame(() => {
    const rect = $contextMenu.getBoundingClientRect();
    $contextMenu.style.left = `${Math.min(clientX, vw - rect.width - 8)}px`;
    $contextMenu.style.top = `${Math.min(clientY, vh - rect.height - 8)}px`;
  });
}

function closeContextMenu() {
  $contextMenu.classList.remove('open');
  $contextMenu.innerHTML = '';
}

$contextMenu.addEventListener('contextmenu', (e) => {
  e.preventDefault();
});

function getAddNodeSubmenu(clientX, clientY) {
  return Object.entries(CATEGORIES).map(([categoryKey, categoryDef]) => ({
    label: categoryDef.label,
    submenu: Object.values(NODE_TYPES)
      .filter((nodeType) => nodeType.category === categoryKey)
      .sort((a, b) => a.displayName.localeCompare(b.displayName))
      .map((nodeType) => ({
        label: nodeType.displayName,
        onClick: () => {
          const point = getCanvasPoint(clientX, clientY);
          addNodeToCanvas(nodeType.type, Math.round(point.x - 80), Math.round(point.y - 20));
        },
      })),
  }));
}

function renderNodePalette() {
  const query = $nodeSearch.value.trim().toLowerCase();
  $nodePaletteList.innerHTML = '';

  for (const [categoryKey, categoryDef] of Object.entries(CATEGORIES)) {
    const types = Object.values(NODE_TYPES)
      .filter((nodeType) => nodeType.category === categoryKey)
      .filter((nodeType) => {
        if (!query) return true;
        return nodeType.displayName.toLowerCase().includes(query) || nodeType.type.toLowerCase().includes(query) || nodeType.description.toLowerCase().includes(query);
      })
      .sort((a, b) => a.type.localeCompare(b.type));

    if (!types.length) continue;

    const group = document.createElement('div');
    group.className = 'palette-group';
    const title = document.createElement('div');
    title.className = 'palette-group-title';
    title.textContent = categoryDef.label;
    group.appendChild(title);

    for (const nodeType of types) {
      const item = document.createElement('div');
      item.className = 'palette-item';
      item.title = nodeType.description || nodeType.type;

      const strip = document.createElement('div');
      strip.className = 'palette-item-strip';
      strip.style.background = categoryDef.color;
      item.appendChild(strip);

      const name = document.createElement('div');
      name.className = 'palette-item-name';
      name.textContent = nodeType.displayName;
      item.appendChild(name);

      item.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        paletteDrag = {
          type: nodeType.type,
          startX: e.clientX,
          startY: e.clientY,
          active: false,
          previewEl: null,
        };
      });

      item.addEventListener('click', (e) => {
        if (suppressNextPaletteClick) {
          suppressNextPaletteClick = false;
          return;
        }
        addNodeAtViewportCenter(nodeType.type);
      });

      group.appendChild(item);
    }

    $nodePaletteList.appendChild(group);
  }
}

function getConnectionsForPort(nodeId, portType) {
  if (portType === 'out') {
    const node = treeData.nodes[nodeId];
    if (!node) return [];
    return node.children.map((childId) => ({ sourceId: nodeId, targetId: childId }));
  }
  if (portType === 'in') {
    const parentId = findParentNodeId(nodeId);
    return parentId ? [{ sourceId: parentId, targetId: nodeId }] : [];
  }
  return [];
}

function isConnectionInList(connection, list) {
  return list.some((item) => isSameConnection(connection, item));
}

function removeConnectionsForPort(nodeId, portType, options = {}) {
  const connections = getConnectionsForPort(nodeId, portType);
  let removedAny = false;
  if (connections.length && !options.skipHistory) pushUndoSnapshot();
  for (const connection of connections) {
    removedAny = removeConnection(connection.sourceId, connection.targetId, { skipHistory: true }) || removedAny;
  }
  return removedAny;
}

function drawBezier(ctx, from, to, options = {}) {
  const { cp1x, cp1y, cp2x, cp2y } = getBezierControlPoints(from, to);
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, to.x, to.y);
  ctx.lineWidth = options.lineWidth || 2;
  ctx.strokeStyle = options.color || '#3a3a55';
  ctx.shadowColor = options.shadowColor || 'transparent';
  ctx.shadowBlur = options.shadowBlur || 0;
  if (options.dashed) ctx.setLineDash([8, 6]);
  else ctx.setLineDash([]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

function drawConnections() {
  const ctx = $connCanvas.getContext('2d');
  const rect = $canvasArea.getBoundingClientRect();
  const w = Math.round(rect.width);
  const h = Math.round(rect.height);
  ctx.clearRect(0, 0, w, h);

  const hovered = state.hoveredConnection;
  const hoveredPortConnections = state.hoveredPort
    ? getConnectionsForPort(state.hoveredPort.nodeId, state.hoveredPort.portType)
    : [];
  for (const record of getConnectionRecords()) {
    const isHovered = isSameConnection(record, hovered);
    const isPortHovered = isConnectionInList(record, hoveredPortConnections);
    const isSibling = hovered && hovered.sourceId === record.sourceId && !isHovered;
    const color = isHovered
      ? record.color
      : (isPortHovered ? `${record.color}b3` : (isSibling ? `${record.color}80` : '#3a3a55'));
    const lineWidth = isHovered ? 7 : (isPortHovered ? 6 : 5);

    drawBezier(ctx, record.from, record.to, {
      color,
      lineWidth,
      shadowColor: isHovered ? `${record.color}cc` : (isPortHovered ? `${record.color}55` : 'transparent'),
      shadowBlur: isHovered ? 12 : (isPortHovered ? 6 : 0),
    });
    if (record.siblingCount > 1) drawConnectionLabel(ctx, record.from, record.to, record.index);
    if (isHovered) drawConnectionFlow(ctx, record.from, record.to, `${record.color}80`);
  }

  if (state.connectionDrag) {
    const drag = state.connectionDrag;
    if (drag.mode === 'from-output') {
      const from = getNodePortPosition(drag.sourceNodeId, 'out');
      if (from) {
        drawBezier(ctx, from, drag.currentPoint, {
          color: drag.color,
          lineWidth: 3,
          dashed: true,
        });
      }
    } else if (drag.mode === 'from-input') {
      const to = getNodePortPosition(drag.targetNodeId, 'in');
      if (to) {
        drawBezier(ctx, drag.currentPoint, to, {
          color: drag.color,
          lineWidth: 3,
          dashed: true,
        });
      }
    }
  }
}

function clearValidConnectionTargets() {
  document.querySelectorAll('.bt-port.connection-valid').forEach((el) => {
    el.classList.remove('connection-valid');
  });
  document.querySelectorAll('.bt-node.connection-valid-node').forEach((el) => {
    el.classList.remove('connection-valid-node');
  });
  state.hoveredConnectionNodeId = null;
}

function findParentNodeId(nodeId) {
  for (const node of Object.values(treeData.nodes)) {
    if (node.children.includes(nodeId)) return node.id;
  }
  return null;
}

function isDescendantNode(rootId, targetId) {
  const root = treeData.nodes[rootId];
  if (!root) return false;
  const stack = [...root.children];
  while (stack.length) {
    const id = stack.pop();
    if (id === targetId) return true;
    const node = treeData.nodes[id];
    if (node) stack.push(...node.children);
  }
  return false;
}

function canConnectNodes(sourceId, targetId) {
  if (!sourceId || !targetId || sourceId === targetId) return false;
  const source = treeData.nodes[sourceId];
  const target = treeData.nodes[targetId];
  if (!source || !target) return false;
  if (!NODE_TYPES[source.type]?.hasOutput) return false;
  if (treeData.root === targetId) return false;
  if (isDescendantNode(targetId, sourceId)) return false;
  return true;
}

function updateValidConnectionTargets(sourceId) {
  clearValidConnectionTargets();
  for (const [nodeId, el] of Object.entries(nodeDomMap)) {
    if (!canConnectNodes(sourceId, nodeId)) continue;
    const portIn = el.querySelector('.bt-port-in');
    if (portIn) portIn.classList.add('connection-valid');
  }
}

function updateValidConnectionSources(targetId) {
  clearValidConnectionTargets();
  for (const [nodeId, el] of Object.entries(nodeDomMap)) {
    if (!canConnectNodes(nodeId, targetId)) continue;
    const portOut = el.querySelector('.bt-port-out');
    if (portOut) portOut.classList.add('connection-valid');
  }
}

function updateHoveredConnectionNode(clientX, clientY) {
  document.querySelectorAll('.bt-node.connection-valid-node').forEach((el) => {
    el.classList.remove('connection-valid-node');
  });
  state.hoveredConnectionNodeId = null;
  if (!state.connectionDrag) return;

  const nodeEl = document.elementFromPoint(clientX, clientY)?.closest('.bt-node');
  const nodeId = nodeEl?.dataset.nodeId || null;
  if (!nodeId) return;

  const valid = state.connectionDrag.mode === 'from-output'
    ? canConnectNodes(state.connectionDrag.sourceNodeId, nodeId)
    : canConnectNodes(nodeId, state.connectionDrag.targetNodeId);
  if (!valid) return;

  nodeEl.classList.add('connection-valid-node');
  state.hoveredConnectionNodeId = nodeId;
}

function connectNodes(sourceId, targetId, options = {}) {
  if (!canConnectNodes(sourceId, targetId)) return false;
  const source = treeData.nodes[sourceId];
  const sourceReg = NODE_TYPES[source.type];
  const maxChildren = sourceReg?.maxChildren ?? null;

  if (!source.children.includes(targetId)) {
    if (!options.skipHistory) pushUndoSnapshot();
    const oldParentId = findParentNodeId(targetId);
    if (oldParentId && oldParentId !== sourceId) {
      const oldParent = treeData.nodes[oldParentId];
      if (oldParent) {
        oldParent.children = oldParent.children.filter((id) => id !== targetId);
      }
    }

    if (typeof maxChildren === 'number' && maxChildren > 0 && source.children.length >= maxChildren) {
      source.children = source.children.slice(0, maxChildren - 1);
    }

    source.children.push(targetId);
  }
  drawConnections();
  if (state.selectedNodeId === sourceId || state.selectedNodeId === targetId) {
    renderRightPanelSelection(state.selectedNodeId);
  }
  scheduleValidationRefresh();
  return true;
}

function renderNode(nodeData) {
  const reg = NODE_TYPES[nodeData.type];
  if (!reg) return null;
  const catColor = CATEGORIES[reg.category]?.color || '#888';

  // 容器
  const el = document.createElement('div');
  el.className = 'bt-node';
  if (nodeData.display.collapsed === false && reg.expandable) {
    el.classList.add('expanded');
  }
  if (treeData.root === nodeData.id) {
    el.classList.add('is-root');
  }
  if (!isNodeEnabled(nodeData)) {
    el.classList.add('disabled');
  }
  el.style.setProperty('--node-cat-color', catColor);
  el.style.left = nodeData.display.x + 'px';
  el.style.top = nodeData.display.y + 'px';
  el.dataset.nodeId = nodeData.id;

  // 输入端口
  const portIn = document.createElement('div');
  portIn.className = 'bt-port bt-port-in';
  portIn.dataset.portType = 'in';
  portIn.dataset.nodeId = nodeData.id;
  el.appendChild(portIn);

  // 标题栏
  const titleBar = document.createElement('div');
  titleBar.className = 'bt-node-title';

  const rootMark = document.createElement('span');
  rootMark.className = 'bt-node-root-mark';
  rootMark.textContent = '★';
  titleBar.appendChild(rootMark);

  const icon = document.createElement('span');
  icon.className = 'bt-node-icon';
  icon.title = isNodeEnabled(nodeData) ? I18N.enabledOn : I18N.enabledOff;
  titleBar.appendChild(icon);

  const nameSpan = document.createElement('span');
  nameSpan.className = 'bt-node-name';
  nameSpan.textContent = reg.displayName;
  titleBar.appendChild(nameSpan);

  const toggle = document.createElement('span');
  toggle.className = 'bt-node-toggle' + (reg.expandable ? '' : ' hidden');
  toggle.textContent = (nodeData.display.collapsed !== false) ? '▶' : '▼';
  titleBar.appendChild(toggle);

  el.appendChild(titleBar);

  // 摘要区
  const summary = document.createElement('div');
  summary.className = 'bt-node-summary';
  summary.textContent = reg.summary(nodeData);
  el.appendChild(summary);

  // 属性编辑区
  if (reg.expandable && reg.props.length > 0) {
    const propsDiv = document.createElement('div');
    propsDiv.className = 'bt-node-props';

    for (const propDef of reg.props) {
      const row = createPropertyControlRow(nodeData, propDef, 'node');
      propsDiv.appendChild(row);
    }
    el.appendChild(propsDiv);
  }

  // 输出端口（仅 composite/decorator）
  if (reg.hasOutput) {
    const portOut = document.createElement('div');
    portOut.className = 'bt-port bt-port-out';
    portOut.dataset.portType = 'out';
    portOut.dataset.nodeId = nodeData.id;
    el.appendChild(portOut);
  }

  // 注册到 DOM
  $nodeContainer.appendChild(el);
  nodeDomMap[nodeData.id] = el;

  bindNodeEvents(nodeData.id, el, titleBar, icon, toggle);

  return el;
}

function createPropertyControlRow(nodeData, propDef, scope) {
  const row = document.createElement('div');
  row.className = scope === 'panel' ? 'inspector-prop-row' : 'bt-node-prop-row';

  const label = document.createElement('span');
  label.className = scope === 'panel' ? 'inspector-prop-label' : 'bt-node-prop-label';
  label.textContent = propDef.label + ':';
  row.appendChild(label);

  let control;
  if (propDef.type === 'select') {
    control = document.createElement('div');
    control.className = 'bt-node-prop-select';
    control.dataset.controlType = 'custom-select';

    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'bt-node-prop-select-btn';
    button.textContent = nodeData.properties[propDef.key] ?? '';
    control.appendChild(button);

    const menu = document.createElement('div');
    menu.className = 'bt-node-prop-select-menu';

    for (const opt of (propDef.options || [])) {
      const optionBtn = document.createElement('button');
      optionBtn.type = 'button';
      optionBtn.className = 'bt-node-prop-select-option';
      optionBtn.textContent = opt;
      optionBtn.dataset.optionValue = opt;
      if (nodeData.properties[propDef.key] == opt) optionBtn.classList.add('active');
      optionBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (nodeData.properties[propDef.key] != opt) pushUndoSnapshot();
        nodeData.properties[propDef.key] = opt;
        updateCustomSelectControl(control, opt);
        updateNodeSummary(nodeData.id);
        syncPropertyControls(nodeData.id, propDef.key, scope);
        control.classList.remove('open');
      });
      menu.appendChild(optionBtn);
    }

    button.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const willOpen = !control.classList.contains('open');
      closeAllCustomSelects(control);
      control.classList.toggle('open', willOpen);
    });

    control.appendChild(menu);
  } else if (propDef.type === 'checkbox') {
    control = document.createElement('input');
    control.type = 'checkbox';
    control.className = 'bt-node-prop-checkbox';
    control.checked = !!nodeData.properties[propDef.key];
    control.addEventListener('change', () => {
      pushUndoSnapshot();
      nodeData.properties[propDef.key] = control.checked;
      updateNodeSummary(nodeData.id);
      syncPropertyControls(nodeData.id, propDef.key, scope);
    });
  } else {
    control = document.createElement('input');
    control.className = 'bt-node-prop-input';
    control.type = propDef.type === 'number' ? 'number' : 'text';
    control.value = nodeData.properties[propDef.key] ?? '';
    control.addEventListener('focus', () => beginPropertyHistory(control));
    control.addEventListener('input', () => {
      const v = propDef.type === 'number' ? Number(control.value) : control.value;
      nodeData.properties[propDef.key] = v;
      updateNodeSummary(nodeData.id);
      syncPropertyControls(nodeData.id, propDef.key, scope);
    });
    control.addEventListener('blur', () => endPropertyHistory(control));
  }

  control.dataset.propKey = propDef.key;
  control.dataset.scope = scope;

  row.appendChild(control);
  return row;
}

function syncPropertyControls(nodeId, propKey, sourceScope) {
  const node = treeData.nodes[nodeId];
  if (!node) return;
  const value = node.properties[propKey];

  const nodeEl = nodeDomMap[nodeId];
  if (nodeEl && sourceScope !== 'node') {
    const control = nodeEl.querySelector(`[data-prop-key="${propKey}"]`);
    if (control) {
      if (control.dataset.controlType === 'custom-select') updateCustomSelectControl(control, value);
      else if (control.type === 'checkbox') control.checked = !!value;
      else control.value = value ?? '';
    }
  }

  if (state.selectedNodeId === nodeId && sourceScope !== 'panel') {
    const panelControl = $rightPanelBody.querySelector(`[data-prop-key="${propKey}"]`);
    if (panelControl) {
      if (panelControl.dataset.controlType === 'custom-select') updateCustomSelectControl(panelControl, value);
      else if (panelControl.type === 'checkbox') panelControl.checked = !!value;
      else panelControl.value = value ?? '';
    }
  }
}

function updateCustomSelectControl(control, value) {
  if (!control) return;
  const button = control.querySelector('.bt-node-prop-select-btn');
  if (button) button.textContent = value ?? '';
  control.querySelectorAll('.bt-node-prop-select-option').forEach((option) => {
    option.classList.toggle('active', option.dataset.optionValue == value);
  });
}

function updateNodeEnabledState(id) {
  const node = treeData.nodes[id];
  const el = nodeDomMap[id];
  if (!node || !el) return;
  const enabled = isNodeEnabled(node);
  el.classList.toggle('disabled', !enabled);
  const icon = el.querySelector('.bt-node-icon');
  if (icon) icon.title = enabled ? I18N.enabledOn : I18N.enabledOff;
}

function updateNodeSummary(id) {
  const node = treeData.nodes[id];
  const el = nodeDomMap[id];
  if (!node || !el) return;
  const reg = NODE_TYPES[node.type];
  if (!reg) return;
  const summaryEl = el.querySelector('.bt-node-summary');
  if (summaryEl) summaryEl.textContent = reg.summary(node);
  scheduleValidationRefresh();
}

function updateNodePosition(id) {
  const node = treeData.nodes[id];
  const el = nodeDomMap[id];
  if (!node || !el) return;
  el.style.left = node.display.x + 'px';
  el.style.top = node.display.y + 'px';
  drawConnections();
}

function removeNodeDom(id) {
  const el = nodeDomMap[id];
  if (el) {
    el.remove();
    delete nodeDomMap[id];
  }
}

function toggleNodeExpand(id) {
  const node = treeData.nodes[id];
  const el = nodeDomMap[id];
  const reg = NODE_TYPES[node?.type];
  if (!node || !el || !reg?.expandable) return;

  const wasCollapsed = node.display.collapsed !== false;
  node.display.collapsed = wasCollapsed ? false : true;

  if (node.display.collapsed) {
    el.classList.remove('expanded');
  } else {
    el.classList.add('expanded');
  }

  // 更新三角
  const toggle = el.querySelector('.bt-node-toggle');
  if (toggle) toggle.textContent = node.display.collapsed ? '▶' : '▼';
  validateTree();
}

function setNodeSelected(id, selected) {
  const el = nodeDomMap[id];
  if (!el) return;
  if (selected) el.classList.add('selected');
  else el.classList.remove('selected');
}

function setNodeMultiSelected(id, selected) {
  const el = nodeDomMap[id];
  if (!el) return;
  el.classList.toggle('multi-selected', selected);
}

function renderMultiSelectionPanel(ids) {
  $rightPanelBody.innerHTML = '';
  renderInspectorTreeSection($rightPanelBody);
  const nodes = ids.map((id) => treeData.nodes[id]).filter(Boolean);
  if (!nodes.length) {
    renderRightPanelPlaceholder();
    return;
  }
  const sameType = nodes.every((node) => node.type === nodes[0].type);
  const box = document.createElement('div');
  box.className = 'inspector-card';
  const title = document.createElement('div');
  title.className = 'inspector-type';
  title.textContent = sameType ? `${nodes.length} 个节点（${getNodeDisplayName(nodes[0].type)}）` : `已选择 ${nodes.length} 个节点（多种类型）`;
  box.appendChild(title);

  const enabledValues = nodes.filter((node) => treeData.root !== node.id).map((node) => isNodeEnabled(node));
  const mixedEnabled = enabledValues.length > 1 && enabledValues.some((v) => v !== enabledValues[0]);
  const enabledLabel = enabledValues.length === 0 ? I18N.rootLocked : (mixedEnabled ? I18N.multipleValues : (enabledValues[0] ? I18N.enabledOn : I18N.enabledOff));
  const enabledRow = document.createElement('div');
  enabledRow.className = 'inspector-row';
  enabledRow.innerHTML = `
    <div class="inspector-label">${I18N.enabled}</div>
    <div class="inspector-status">
      <button type="button" class="inspector-toggle${!mixedEnabled && enabledValues[0] ? ' on' : ''}" ${enabledValues.length === 0 ? 'disabled' : ''}></button>
      <div class="inspector-status-text">${enabledLabel}</div>
    </div>
  `;
  const toggleBtn = enabledRow.querySelector('.inspector-toggle');
  if (toggleBtn && enabledValues.length) {
    toggleBtn.addEventListener('click', () => {
      const nextValue = mixedEnabled ? true : !enabledValues[0];
      setNodesEnabled(ids, nextValue);
    });
  }
  box.appendChild(enabledRow);

  if (sameType) {
    const reg = NODE_TYPES[nodes[0].type];
    box.appendChild(Object.assign(document.createElement('div'), { className: 'inspector-divider' }));
    const propsLabel = document.createElement('div');
    propsLabel.className = 'inspector-label';
    propsLabel.textContent = I18N.properties;
    box.appendChild(propsLabel);
    const propsHost = document.createElement('div');
    propsHost.className = 'inspector-props';
    (reg?.props || []).forEach((propDef) => {
      const values = nodes.map((node) => node.properties[propDef.key]);
      const allSame = values.every((value) => value === values[0]);
      const row = document.createElement('div');
      row.className = 'inspector-prop-row';
      const label = document.createElement('span');
      label.className = 'inspector-prop-label';
      label.textContent = `${propDef.label}:`;
      row.appendChild(label);

      let control;
      if (propDef.type === 'select') {
        control = createInspectorSelectControl(allSame ? values[0] : I18N.multipleValues, propDef.options || [], (value) => {
          applyPropertyToNodes(ids, propDef.key, value);
        });
        if (!allSame) updateCustomSelectControl(control, I18N.multipleValues);
      } else if (propDef.type === 'checkbox') {
        control = document.createElement('input');
        control.type = 'checkbox';
        control.className = 'bt-node-prop-checkbox';
        control.checked = allSame ? !!values[0] : false;
        control.indeterminate = !allSame;
        control.addEventListener('change', () => {
          control.indeterminate = false;
          applyPropertyToNodes(ids, propDef.key, control.checked);
        });
      } else {
        control = document.createElement('input');
        control.className = 'bt-node-prop-input';
        control.type = propDef.type === 'number' ? 'number' : 'text';
        control.value = allSame ? (values[0] ?? '') : '';
        if (!allSame) control.placeholder = I18N.multipleValues;
        control.addEventListener('focus', () => beginPropertyHistory(control));
        control.addEventListener('blur', () => {
          endPropertyHistory(control);
          if (control.value === '' && !allSame && propDef.type === 'number') return;
          const nextValue = propDef.type === 'number' ? Number(control.value) : control.value;
          if (control.value !== '') applyPropertyToNodes(ids, propDef.key, nextValue);
        });
      }
      row.appendChild(control);
      propsHost.appendChild(row);
    });
    if (!(reg?.props || []).length) {
      const empty = document.createElement('div');
      empty.className = 'inspector-empty';
      empty.textContent = I18N.noEditableProps;
      propsHost.appendChild(empty);
    }
    box.appendChild(propsHost);
  } else {
    const note = document.createElement('div');
    note.className = 'inspector-note';
    note.textContent = '当前可批量移动、启用/关闭和删除。';
    box.appendChild(note);
  }

  const actions = document.createElement('div');
  actions.className = 'inspector-btn-row';
  const deleteBtn = document.createElement('button');
  deleteBtn.type = 'button';
  deleteBtn.className = 'inspector-btn danger';
  deleteBtn.textContent = I18N.delete_;
  deleteBtn.addEventListener('click', () => deleteSelectedNodes());
  actions.appendChild(deleteBtn);
  box.appendChild(actions);
  $rightPanelBody.appendChild(box);
}

function setSelectedNodes(ids) {
  const uniqueIds = [...new Set(ids.filter((id) => treeData.nodes[id]))];
  const prevIds = state.selectedNodeIds || [];
  prevIds.forEach((id) => {
    setNodeSelected(id, false);
    setNodeMultiSelected(id, false);
  });
  state.selectedNodeIds = uniqueIds;
  state.selectedNodeId = uniqueIds.length === 1 ? uniqueIds[0] : (uniqueIds[0] || null);
  uniqueIds.forEach((id) => {
    if (uniqueIds.length === 1) setNodeSelected(id, true);
    else setNodeMultiSelected(id, true);
  });
  if (uniqueIds.length === 0) renderRightPanelPlaceholder();
  else if (uniqueIds.length === 1) renderRightPanelSelection(uniqueIds[0]);
  else renderMultiSelectionPanel(uniqueIds);
}

function toggleNodeInSelection(id) {
  const current = new Set(state.selectedNodeIds || []);
  if (current.has(id)) current.delete(id);
  else current.add(id);
  setSelectedNodes([...current]);
}

function renderRightPanelPlaceholder() {
  $rightPanelBody.innerHTML = '';
  renderInspectorTreeSection($rightPanelBody);
  const placeholder = document.createElement('p');
  placeholder.className = 'placeholder-text';
  placeholder.textContent = I18N.clickToEdit;
  $rightPanelBody.appendChild(placeholder);
}

function renderRightPanelSelection(id) {
  const node = treeData.nodes[id];
  if (!node) {
    renderRightPanelPlaceholder();
    return;
  }
  const reg = NODE_TYPES[node.type];
  const category = CATEGORIES[node.category];
  const categoryLabel = category?.label || node.category;
  const categoryColor = category?.color || '#888';
  const enabledLabel = isNodeEnabled(node) ? I18N.enabledOn : I18N.enabledOff;
  const rootLocked = treeData.root === id;
  const hasOutput = !!reg?.hasOutput;
  const showChildrenPanel = hasOutput && reg?.maxChildren !== 1;

  $rightPanelBody.innerHTML = '';
  renderInspectorTreeSection($rightPanelBody);
  $rightPanelBody.insertAdjacentHTML('beforeend', `
    <div class="inspector-card">
      <div class="inspector-meta">
        <div class="inspector-type">${getNodeDisplayName(node.type)}</div>
        <div class="inspector-category"><span class="inspector-category-dot" style="background:${categoryColor}"></span>${categoryLabel}</div>
        <div class="inspector-id">${node.id}</div>
      </div>
      <div class="inspector-row">
        <div class="inspector-label">${I18N.enabled}</div>
        <div class="inspector-status">
          <button type="button" class="inspector-toggle${isNodeEnabled(node) ? ' on' : ''}" ${rootLocked ? 'disabled' : ''}></button>
          <div class="inspector-status-text">${enabledLabel}</div>
        </div>
      </div>
      <div class="inspector-divider"></div>
      <div class="inspector-label">${I18N.nodeActions}</div>
      <div class="inspector-node-actions"></div>
      ${showChildrenPanel ? `<div class="inspector-divider"></div><div class="inspector-label">${I18N.childNodes}</div><div class="inspector-children"></div>` : ''}
      <div class="inspector-divider"></div>
      <div class="inspector-label">${I18N.properties}</div>
      <div class="inspector-props"></div>
    </div>
  `);

  const toggleBtn = $rightPanelBody.querySelector('.inspector-toggle');
  const actionsHost = $rightPanelBody.querySelector('.inspector-node-actions');
  const childrenHost = $rightPanelBody.querySelector('.inspector-children');
  const propsHost = $rightPanelBody.querySelector('.inspector-props');
  if (toggleBtn && !rootLocked) {
    toggleBtn.addEventListener('click', () => {
      setNodeEnabled(id, !isNodeEnabled(node));
    });
  }

  if (actionsHost) {
    const actionRow = document.createElement('div');
    actionRow.className = 'inspector-btn-row';

    const rootBtn = document.createElement('button');
    rootBtn.type = 'button';
    rootBtn.className = 'inspector-btn';
    rootBtn.textContent = rootLocked ? I18N.rootNode : I18N.setAsRoot;
    rootBtn.disabled = rootLocked;
    rootBtn.addEventListener('click', () => setNodeRoot(id));
    actionRow.appendChild(rootBtn);

    const deleteBtn = document.createElement('button');
    deleteBtn.type = 'button';
    deleteBtn.className = 'inspector-btn danger';
    deleteBtn.textContent = I18N.delete_;
    deleteBtn.addEventListener('click', () => deleteNode(id));
    actionRow.appendChild(deleteBtn);

    actionsHost.appendChild(actionRow);
  }

  if (childrenHost) {
    if (hasOutput && node.children.length) {
      const dropLine = document.createElement('div');
      dropLine.className = 'inspector-drop-line';
      childrenHost.appendChild(dropLine);

      node.children.forEach((childId, index) => {
        const child = treeData.nodes[childId];
        if (!child) return;
        const childCat = CATEGORIES[child.category];
        const item = document.createElement('div');
        item.className = 'inspector-child-item';
        item.dataset.childIndex = String(index);
        item.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          if (e.target.closest('.inspector-icon-btn')) return;
          e.preventDefault();
          beginChildReorderDrag(id, index, item, childrenHost, e.clientY);
        });

        const strip = document.createElement('div');
        strip.className = 'inspector-child-strip';
        strip.style.background = childCat?.color || '#888';
        item.appendChild(strip);

        const main = document.createElement('div');
        main.className = 'inspector-child-main';
        const name = document.createElement('div');
        name.className = 'inspector-child-name';
        name.textContent = getNodeDisplayName(child.type);
        const meta = document.createElement('div');
        meta.className = 'inspector-child-meta';
        meta.textContent = child.id;
        main.appendChild(name);
        main.appendChild(meta);
        item.appendChild(main);

        const actions = document.createElement('div');
        actions.className = 'inspector-child-actions';

        const upBtn = document.createElement('button');
        upBtn.type = 'button';
        upBtn.className = 'inspector-icon-btn';
        upBtn.textContent = '↑';
        upBtn.disabled = index === 0;
        upBtn.addEventListener('click', () => moveChildNode(id, index, index - 1));
        actions.appendChild(upBtn);

        const downBtn = document.createElement('button');
        downBtn.type = 'button';
        downBtn.className = 'inspector-icon-btn';
        downBtn.textContent = '↓';
        downBtn.disabled = index === node.children.length - 1;
        downBtn.addEventListener('click', () => moveChildNode(id, index, index + 1));
        actions.appendChild(downBtn);

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'inspector-icon-btn';
        removeBtn.textContent = '×';
        removeBtn.addEventListener('click', () => removeConnection(id, childId));
        actions.appendChild(removeBtn);

        item.appendChild(actions);
        childrenHost.appendChild(item);
      });
    } else {
      const empty = document.createElement('div');
      empty.className = 'inspector-empty';
      empty.textContent = I18N.noChildren;
      childrenHost.appendChild(empty);
    }
  }

  if (propsHost) {
    if (reg?.props?.length) {
      for (const propDef of reg.props) {
        propsHost.appendChild(createPropertyControlRow(node, propDef, 'panel'));
      }
    } else {
      const empty = document.createElement('div');
      empty.className = 'inspector-empty';
      empty.textContent = I18N.noEditableProps;
      propsHost.appendChild(empty);
    }
  }
}

function selectNode(id) {
  if (state.selectedNodeIds?.length === 1 && state.selectedNodeId === id) {
    renderRightPanelSelection(id);
    return;
  }
  setSelectedNodes(id ? [id] : []);
}

function toggleNodeEnabled(id) {
  const node = treeData.nodes[id];
  if (!node || treeData.root === id) return;
  setNodeEnabled(id, !isNodeEnabled(node));
}

function setNodeRoot(id, options = {}) {
  const node = treeData.nodes[id];
  if (!node) return;
  if (!options.skipHistory && treeData.root !== id) pushUndoSnapshot();
  // 移除旧 root 标记
  if (treeData.root && nodeDomMap[treeData.root]) {
    nodeDomMap[treeData.root].classList.remove('is-root');
  }
  node.enabled = true;
  treeData.root = id;
  if (id && nodeDomMap[id]) {
    nodeDomMap[id].classList.add('is-root');
  }
  updateNodeEnabledState(id);
  if (state.selectedNodeId === id) renderRightPanelSelection(id);
  scheduleValidationRefresh();
}

let nodeDragState = null;
const NODE_DRAG_THRESHOLD = 6;
const NODE_TITLE_DOUBLE_CLICK_MS = 280;

function getNodeRectInCanvas(nodeId) {
  const el = nodeDomMap[nodeId];
  if (!el) return null;
  const rect = el.getBoundingClientRect();
  const canvasRect = $canvasArea.getBoundingClientRect();
  return {
    left: rect.left - canvasRect.left,
    top: rect.top - canvasRect.top,
    right: rect.right - canvasRect.left,
    bottom: rect.bottom - canvasRect.top,
  };
}

function rectsIntersect(a, b) {
  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
}

function updateSelectionRect(rect) {
  $selectionRect.style.display = 'block';
  $selectionRect.style.left = `${rect.left}px`;
  $selectionRect.style.top = `${rect.top}px`;
  $selectionRect.style.width = `${rect.width}px`;
  $selectionRect.style.height = `${rect.height}px`;
}

function hideSelectionRect() {
  $selectionRect.style.display = 'none';
}

function bindNodeEvents(id, el, titleBar, icon, toggle) {
  let lastTitleClickAt = 0;
  let lastTitleClickX = 0;
  let lastTitleClickY = 0;
  let suppressNodeClick = false;
  const portIn = el.querySelector('.bt-port-in');
  const portOut = el.querySelector('.bt-port-out');

  el.addEventListener('click', (e) => {
    if (e.target.closest('.bt-port')) return;
    if (suppressNodeClick) {
      suppressNodeClick = false;
      return;
    }
    if (e.shiftKey) toggleNodeInSelection(id);
    else selectNode(id);
  });

  icon.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
  });
  icon.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    toggleNodeEnabled(id);
  });

  toggle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
  });
  toggle.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    toggleNodeExpand(id);
  });

  titleBar.addEventListener('mouseup', (e) => {
    if (e.button !== 0) return;
    if (e.target.closest('.bt-node-icon, .bt-node-toggle')) return;
    if (nodeDragState && nodeDragState.id === id && nodeDragState.active) return;

    const now = performance.now();
    const dx = Math.abs(e.clientX - lastTitleClickX);
    const dy = Math.abs(e.clientY - lastTitleClickY);
    const isDoubleClick =
      now - lastTitleClickAt <= NODE_TITLE_DOUBLE_CLICK_MS &&
      dx <= NODE_DRAG_THRESHOLD &&
      dy <= NODE_DRAG_THRESHOLD;

    if (isDoubleClick) {
      e.preventDefault();
      e.stopPropagation();
      nodeDragState = null;
      $canvasArea.style.cursor = '';
      lastTitleClickAt = 0;
      toggleNodeExpand(id);
      return;
    }

    lastTitleClickAt = now;
    lastTitleClickX = e.clientX;
    lastTitleClickY = e.clientY;
  });

  if (portIn) {
    portIn.addEventListener('mouseenter', () => {
      state.hoveredPort = { nodeId: id, portType: 'in' };
      state.hoveredConnection = null;
      drawConnections();
    });
    portIn.addEventListener('mouseleave', () => {
      if (!state.hoveredPort || state.hoveredPort.nodeId !== id || state.hoveredPort.portType !== 'in') return;
      state.hoveredPort = null;
      drawConnections();
    });
    portIn.addEventListener('mousedown', (e) => {
      if (e.button === 0) {
        const start = getPortScreenPosition(portIn);
        state.connectionDrag = {
          mode: 'from-input',
          targetNodeId: id,
          currentPoint: start,
          color: getConnectionStrokeColor(treeData.nodes[id]),
        };
        updateValidConnectionSources(id);
        drawConnections();
      }
      e.preventDefault();
      e.stopPropagation();
    });
  }

  if (portOut) {
    portOut.addEventListener('mouseenter', () => {
      state.hoveredPort = { nodeId: id, portType: 'out' };
      state.hoveredConnection = null;
      drawConnections();
    });
    portOut.addEventListener('mouseleave', () => {
      if (!state.hoveredPort || state.hoveredPort.nodeId !== id || state.hoveredPort.portType !== 'out') return;
      state.hoveredPort = null;
      drawConnections();
    });
    portOut.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      const start = getPortScreenPosition(portOut);
      state.connectionDrag = {
        mode: 'from-output',
        sourceNodeId: id,
        currentPoint: start,
        color: getConnectionStrokeColor(treeData.nodes[id]),
      };
      updateValidConnectionTargets(id);
      drawConnections();
    });
  }

  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (e.target.closest('.bt-port, .bt-node-toggle, .bt-node-icon, input, select, textarea, button, label')) {
      return;
    }

    e.preventDefault();
    e.stopPropagation();
    const selectedIds = state.selectedNodeIds || [];
    if (e.shiftKey && !selectedIds.includes(id)) {
      return;
    }
    if (!selectedIds.includes(id)) selectNode(id);

    const dragIds = selectedIds.includes(id) ? [...selectedIds] : [id];
    const node = treeData.nodes[id];
    const point = getCanvasPoint(e.clientX, e.clientY);
    nodeDragState = {
      id,
      ids: dragIds,
      suppressClick: () => { suppressNodeClick = true; },
      startClientX: e.clientX,
      startClientY: e.clientY,
      offsetX: point.x - node.display.x,
      offsetY: point.y - node.display.y,
      active: false,
      beforeSnapshot: createSnapshot(),
      startPositions: Object.fromEntries(dragIds.map((nodeId) => [nodeId, { x: treeData.nodes[nodeId].display.x, y: treeData.nodes[nodeId].display.y }])),
    };
  });
}

window.addEventListener('mousemove', (e) => {
  lastMouseClientX = e.clientX;
  lastMouseClientY = e.clientY;

  if (paletteDrag) {
    if (!paletteDrag.active) {
      const dx = e.clientX - paletteDrag.startX;
      const dy = e.clientY - paletteDrag.startY;
      if (Math.abs(dx) >= 4 || Math.abs(dy) >= 4) {
        paletteDrag.active = true;
        suppressNextPaletteClick = true;
        paletteDrag.previewEl = createPaletteDragPreview(paletteDrag.type);
      }
    }
    if (paletteDrag.active) updatePaletteDragPreview(e.clientX, e.clientY);
  }

  if (childReorderDrag) {
    updateChildReorderDrag(e.clientY);
  }

  if (state.connectionDrag) {
    state.connectionDrag.currentPoint = getCanvasLocalPoint(e.clientX, e.clientY);
    updateHoveredConnectionNode(e.clientX, e.clientY);
    drawConnections();
  }

  if (state.marquee) {
    const current = getCanvasLocalPoint(e.clientX, e.clientY);
    const left = Math.min(state.marquee.startX, current.x);
    const top = Math.min(state.marquee.startY, current.y);
    const width = Math.abs(current.x - state.marquee.startX);
    const height = Math.abs(current.y - state.marquee.startY);
    updateSelectionRect({ left, top, width, height });
    const selectRect = { left, top, right: left + width, bottom: top + height };
    const hitIds = Object.keys(treeData.nodes).filter((nodeId) => {
      const rect = getNodeRectInCanvas(nodeId);
      return rect && rectsIntersect(selectRect, rect);
    });
    const nextIds = state.marquee.additive
      ? [...new Set([...state.marquee.baseIds, ...hitIds])]
      : hitIds;
    setSelectedNodes(nextIds);
  }

  if (!nodeDragState) return;
  const node = treeData.nodes[nodeDragState.id];
  if (!node) return;
  if (!nodeDragState.active) {
    const dx = e.clientX - nodeDragState.startClientX;
    const dy = e.clientY - nodeDragState.startClientY;
    if (Math.abs(dx) < NODE_DRAG_THRESHOLD && Math.abs(dy) < NODE_DRAG_THRESHOLD) return;
    nodeDragState.active = true;
    $canvasArea.style.cursor = 'grabbing';
  }
  const point = getCanvasPoint(e.clientX, e.clientY);
  const dx = Math.round(point.x - nodeDragState.offsetX - nodeDragState.startPositions[nodeDragState.id].x);
  const dy = Math.round(point.y - nodeDragState.offsetY - nodeDragState.startPositions[nodeDragState.id].y);
  nodeDragState.ids.forEach((nodeId) => {
    const start = nodeDragState.startPositions[nodeId];
    treeData.nodes[nodeId].display.x = start.x + dx;
    treeData.nodes[nodeId].display.y = start.y + dy;
    updateNodePosition(nodeId);
  });
});

window.addEventListener('mouseup', (e) => {
  if (e.button === 0 && state.marquee) {
    state.marquee = null;
    hideSelectionRect();
  }

  if (e.button === 0 && paletteDrag) {
    finishPaletteDrag(e.clientX, e.clientY);
  }

  if (e.button === 0 && childReorderDrag) {
    finishChildReorderDrag();
  }

  if (e.button === 0 && state.connectionDrag) {
    if (state.connectionDrag.mode === 'from-output') {
      const portIn = e.target.closest('.bt-port-in');
      const nodeEl = e.target.closest('.bt-node');
      const targetNodeId = portIn?.dataset.nodeId || nodeEl?.dataset.nodeId || null;
      connectNodes(state.connectionDrag.sourceNodeId, targetNodeId);
    } else if (state.connectionDrag.mode === 'from-input') {
      const portOut = e.target.closest('.bt-port-out');
      const nodeEl = e.target.closest('.bt-node');
      const sourceNodeId = portOut?.dataset.nodeId || nodeEl?.dataset.nodeId || null;
      connectNodes(sourceNodeId, state.connectionDrag.targetNodeId);
    }
    state.connectionDrag = null;
    clearValidConnectionTargets();
    state.hoveredConnection = null;
    drawConnections();
  }

  if (e.button !== 0 || !nodeDragState) return;
  if (nodeDragState.active) {
    applyGridSnapToNodes(nodeDragState.ids, e.shiftKey);
    pushUndoSnapshot(nodeDragState.beforeSnapshot);
    nodeDragState.suppressClick?.();
  }
  nodeDragState = null;
  $canvasArea.style.cursor = '';
});

document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('#context-menu')) closeContextMenu();
  if (e.button === 2 && paletteDrag) {
    suppressNextContextMenu = true;
    cancelPaletteDrag();
    e.preventDefault();
    e.stopPropagation();
    return;
  }
  if (e.target.closest('.bt-node-prop-select')) return;
  closeAllCustomSelects(null);
});

window.addEventListener('mousedown', (e) => {
  if (!e.target.closest('#context-menu')) closeContextMenu();
}, true);

$canvasArea.addEventListener('mousemove', (e) => {
  if (state.connectionDrag || state.hoveredPort) return;
  const hovered = hitTestConnections(getCanvasLocalPoint(e.clientX, e.clientY));
  const changed = !isSameConnection(hovered, state.hoveredConnection);
  if (!changed) return;
  state.hoveredConnection = hovered;
  $canvasArea.style.cursor = hovered ? 'pointer' : '';
  drawConnections();
});

$canvasArea.addEventListener('mouseleave', () => {
  if ((!state.hoveredConnection && !state.hoveredPort) || state.connectionDrag) return;
  state.hoveredConnection = null;
  state.hoveredPort = null;
  $canvasArea.style.cursor = '';
  drawConnections();
});

$canvasArea.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (state.connectionDrag) {
    state.connectionDrag = null;
    clearValidConnectionTargets();
    state.hoveredConnection = null;
    state.hoveredPort = null;
    drawConnections();
  }
  if (e.target.closest('.bt-node')) return;
  const rect = getCanvasLocalPoint(e.clientX, e.clientY);
  state.marquee = {
    startX: rect.x,
    startY: rect.y,
    additive: e.shiftKey,
    baseIds: e.shiftKey ? [...(state.selectedNodeIds || [])] : [],
  };
  if (!e.shiftKey) selectNode(null);
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeContextMenu();
    closeHelpOverlay();
    if (paletteDrag) {
      cancelPaletteDrag();
    }
    if (state.connectionDrag) {
      state.connectionDrag = null;
      clearValidConnectionTargets();
      drawConnections();
    }
    if (state.marquee) {
      state.marquee = null;
      hideSelectionRect();
    }
    if (state.selectedNodeIds?.length) {
      setSelectedNodes([]);
    }
  }
  const isFitView = !e.ctrlKey && !e.metaKey && !e.shiftKey && e.key.toLowerCase() === 'f';
  const isSetRoot = !e.ctrlKey && !e.metaKey && !e.shiftKey && e.key.toLowerCase() === 'r';
  const isUndo = (e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z';
  const isRedo = (e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'z';
  const isCopy = (e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'c';
  const isPaste = (e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'v';
  const isCut = (e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'x';
  if (isUndo) {
    e.preventDefault();
    undo();
    return;
  }
  if (isRedo) {
    e.preventDefault();
    redo();
    return;
  }
  const activeTag = document.activeElement?.tagName;
  if (activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT') return;
  if (isFitView) {
    e.preventDefault();
    fitViewToNodes();
    return;
  }
  if (isSetRoot) {
    if (state.selectedNodeIds?.length === 1 && state.selectedNodeId) {
      e.preventDefault();
      setNodeRoot(state.selectedNodeId);
    }
    return;
  }
  if (isCopy) {
    if (copySelectionToClipboard()) e.preventDefault();
    return;
  }
  if (isPaste) {
    if (pasteNodeFromClipboard()) e.preventDefault();
    return;
  }
  if (isCut) {
    if (copySelectionToClipboard()) {
      const removed = (state.selectedNodeIds || []).length > 1 ? deleteSelectedNodes() : (state.selectedNodeId ? deleteNode(state.selectedNodeId) : false);
      if (removed) e.preventDefault();
    }
    return;
  }

  if (e.key !== 'Delete' && e.key !== 'Backspace') return;
  if (state.connectionDrag) return;

  let removed = false;
  if (state.hoveredPort) {
    removed = removeConnectionsForPort(state.hoveredPort.nodeId, state.hoveredPort.portType);
  } else if (state.hoveredConnection) {
    removed = removeConnection(state.hoveredConnection.sourceId, state.hoveredConnection.targetId);
  } else if ((state.selectedNodeIds || []).length > 1) {
    removed = deleteSelectedNodes();
  } else if (state.selectedNodeId) {
    removed = deleteNode(state.selectedNodeId);
  }

  if (removed) {
    e.preventDefault();
  }
});

window.addEventListener('beforeunload', (e) => {
  writeAutosaveNow();
  e.preventDefault();
  e.returnValue = '';
});

/* ============================================================
   向画布添加节点（便捷函数）
   ============================================================ */
function addNodeToCanvas(type, x, y, options = {}) {
  if (!options.skipHistory) pushUndoSnapshot();
  const nodeData = createNodeData(type, x, y);
  if (!nodeData) return null;
  renderNode(nodeData);
  // 第一个节点自动设为 root
  if (Object.keys(treeData.nodes).length === 1) {
    setNodeRoot(nodeData.id, { skipHistory: true });
  }
  scheduleValidationRefresh();
  return nodeData;
}

/* ============================================================
   初始化
   ============================================================ */
onResize();
renderNodePalette();
renderRightPanelPlaceholder();
updateHistoryButtons();

// 添加几个测试节点，验证渲染
addNodeToCanvas('Sequence', 100, 50, { skipHistory: true });
addNodeToCanvas('InjectInput', 40, 180, { skipHistory: true });
addNodeToCanvas('WaitFrames', 200, 180, { skipHistory: true });
addNodeToCanvas('CheckHP', 360, 50, { skipHistory: true });
addNodeToCanvas('Repeat', 360, 180, { skipHistory: true });

try {
  const saved = localStorage.getItem(AUTOSAVE_KEY);
  if (saved) {
    recoveredAutosave = JSON.parse(saved);
    showRecoveryBanner(true);
  }
} catch {}

validateTree();

</script>
